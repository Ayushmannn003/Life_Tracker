<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Academic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6',
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24'
                    }
                }
            }
        }
    </script>
    <style>
        /* UNIVERSAL MOBILE SCROLL LOCK */
        body,
        html {
            background-color: #000;
            color: #C5C6C7;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .mobile-viewport {
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            background-color: #020202;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* DARK GRADIENT IMAGE BACKGROUND */
        .academic-bg {
            background: linear-gradient(160deg, rgba(15, 23, 42, 0.92) 0%, rgba(5, 5, 5, 0.98) 100%),
                url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: grayscale(80%);
        }

        .vignette {
            background: radial-gradient(circle at 50% 0%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.8) 100%);
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 1.25rem;
        }

        main::-webkit-scrollbar {
            display: none;
        }

        /* GLASSMORPHIC PANELS */
        .glass-panel {
            background: rgba(10, 12, 16, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .progress-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            transition: width 1s ease-in-out;
        }

        /* TECH STACK TAGS */
        .tech-tag {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #9CA3AF;
        }
    </style>
</head>

<body>

    <div class="mobile-viewport">
        <div class="academic-bg"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            <div id="sidebar-injector"></div>

            <header
                class="p-6 pb-2 flex justify-between items-center z-20 bg-black/20 backdrop-blur-md border-b border-white/5 relative">
                <div class="flex items-center gap-4">
                    <i id="menu-btn"
                        class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                    <h1 class="text-xl font-black text-white tracking-widest uppercase">Academic Hub</h1>
                </div>
                <div
                    class="text-[9px] font-black text-accentPurple border border-accentPurple/30 bg-accentPurple/10 px-3 py-1 rounded-full uppercase flex items-center gap-1.5 shadow-[0_0_10px_rgba(168,85,247,0.2)]">
                    Semester <span id="semester-number-display">6</span>
                </div>
            </header>

            <main>
                <div class="space-y-8 p-1">

                    <div class="glass-panel p-6 rounded-[2.5rem] border-t-2 border-t-accentPurple relative">
                        <button onclick="promptEditSemester()"
                            class="absolute top-6 right-6 w-8 h-8 rounded-full bg-white/5 flex justify-center items-center text-gray-400 hover:text-white hover:bg-white/10 transition active:scale-90 border border-white/10 z-20">
                            <i class="ph ph-pencil-simple"></i>
                        </button>

                        <div class="flex justify-between items-end mb-3 pr-10">
                            <div>
                                <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-1">Semester
                                    Arc</p>
                                <h2 class="text-3xl font-black text-white"><span id="semester-days-left">0</span> <span
                                        class="text-lg text-gray-500">Days Left</span></h2>
                            </div>
                        </div>
                        <div class="progress-track">
                            <div id="semester-progress-bar"
                                class="progress-fill bg-accentPurple w-[0%] shadow-[0_0_8px_rgba(168,85,247,0.8)]">
                            </div>
                        </div>
                        <div class="flex justify-between mt-2">
                            <p id="semester-start-display"
                                class="text-[8px] text-gray-600 font-bold uppercase tracking-widest">Start: --</p>
                            <p id="semester-pct-display"
                                class="text-[9px] text-gray-400 italic uppercase tracking-widest">0% Completed</p>
                        </div>
                    </div>

                    <div class="border border-white/5 rounded-[2.5rem] p-1 bg-black/20">
                        <div class="flex justify-between items-center mb-3 pl-3 pr-2 pt-3">
                            <div class="flex items-center gap-2">
                                <i
                                    class="ph-fill ph-warning-circle text-accentRed text-lg drop-shadow-[0_0_5px_rgba(255,76,76,0.5)]"></i>
                                <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Active Deadlines
                                </h3>
                            </div>
                            <button onclick="triggerAddModal('1')"
                                class="text-[9px] font-black text-white bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full border border-white/10 uppercase tracking-widest transition active:scale-95 flex items-center gap-1">
                                <i class="ph-bold ph-plus"></i> Add
                            </button>
                        </div>

                        <div class="space-y-2 pb-2 px-2" id="deadline-container">
                            <p class="text-[10px] text-gray-500 italic uppercase tracking-widest text-center py-4">
                                Loading Data...</p>
                        </div>
                    </div>

                    <div class="border border-white/5 rounded-[2.5rem] p-1 bg-black/20">
                        <div class="flex justify-between items-center mb-3 pl-3 pr-2 pt-3">
                            <div class="flex items-center gap-2">
                                <i
                                    class="ph-fill ph-books text-accentBlue text-lg drop-shadow-[0_0_5px_rgba(59,130,246,0.5)]"></i>
                                <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Course Matrix
                                </h3>
                            </div>
                            <div class="flex items-center gap-2">
                                <span
                                    class="text-[8px] font-black text-gray-400 uppercase tracking-widest bg-black/50 px-2 py-1 rounded border border-white/5 hidden sm:block">Target:
                                    75%</span>
                                <button onclick="triggerAddModal('3')"
                                    class="text-[9px] font-black text-white bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full border border-white/10 uppercase tracking-widest transition active:scale-95 flex items-center gap-1">
                                    <i class="ph-bold ph-plus"></i> Add
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 pb-2 px-2" id="course-container">
                            <p
                                class="text-[10px] text-gray-500 italic uppercase tracking-widest col-span-2 text-center py-4">
                                Loading Data...</p>
                        </div>
                    </div>

                    <div class="border border-white/5 rounded-[2.5rem] p-1 bg-black/20">
                        <div class="flex justify-between items-center mb-3 pl-3 pr-2 pt-3">
                            <div class="flex items-center gap-2">
                                <i
                                    class="ph-fill ph-kanban text-accentTeal text-lg drop-shadow-[0_0_5px_rgba(102,252,241,0.5)]"></i>
                                <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Engineering
                                    Builds</h3>
                            </div>
                            <button onclick="triggerAddModal('2')"
                                class="text-[9px] font-black text-white bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full border border-white/10 uppercase tracking-widest transition active:scale-95 flex items-center gap-1">
                                <i class="ph-bold ph-plus"></i> Add
                            </button>
                        </div>

                        <div class="space-y-2 pb-2 px-2" id="project-container">
                            <p class="text-[10px] text-gray-500 italic uppercase tracking-widest text-center py-4">
                                Loading Data...</p>
                        </div>
                    </div>

                </div>

                <div class="h-10"></div>
            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/academics.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('System OS Service Worker registered!', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
