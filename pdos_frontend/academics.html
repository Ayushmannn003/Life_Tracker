<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System OS | Academic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6',
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24',
                        cardBg: '#080A0E'
                    }
                }
            }
        }
    </script>
    <style>
        /* STRICT MOBILE LOCK */
        body,
        html {
            background-color: #000;
            color: #C5C6C7;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .mobile-viewport {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            background-color: #020202;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        main {
            padding: 1rem;
            flex: 1;
            padding-bottom: 6rem;
            overflow-y: auto;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* SLEEK CARD SYSTEM */
        .sys-card {
            background: #080A0E;
            border: 1px solid #14171F;
            border-radius: 1.25rem;
            padding: 1.25rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 1rem;
            position: relative;
        }

        .border-teal {
            border-top: 2px solid #66FCF1;
        }

        .border-purple {
            border-top: 2px solid #A855F7;
        }

        .border-red {
            border-top: 2px solid #FF4C4C;
        }

        .touch-btn {
            transition: transform 0.1s;
            cursor: pointer;
        }

        .touch-btn:active {
            transform: scale(0.96);
        }

        /* CENTERED GLASS MODALS */
        .center-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%) scale(0.95);
            width: 90%;
            max-width: 380px;
            background: rgba(8, 10, 14, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.75rem;
            padding: 1.5rem;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            max-height: 85vh;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .center-modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sys-input {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }

        .sys-input:focus {
            border-color: #66FCF1;
        }

        /* SLIDER OVERRIDES */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 15px 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #14171F;
            border-radius: 10px;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            box-shadow: 0 0 15px currentColor;
            border: 2px solid #000;
        }

        body,
        html {
            height: 100dvh;
            overflow: hidden;
            /* This stops the whole screen from scrolling */
            margin: 0;
        }

        .mobile-viewport {
            height: 100%;
            display: flex;
            flex-direction: column;
            /* Allows content and nav to stack */
        }

        main {
            flex: 1;
            overflow-y: auto;
            /* Only your content area scrolls */
            padding-bottom: 2rem;
        }
    </style>
</head>

<body>

    <div class="mobile-viewport">
        <header
            class="sticky top-0 p-6 pb-4 flex justify-between items-center z-50 bg-[#020202]/90 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center gap-4">
                <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                <h1 class="text-xl font-black text-white tracking-widest uppercase">Academic Hub</h1>
            </div>
            <div
                class="text-[10px] font-black text-accentPurple uppercase tracking-widest bg-accentPurple/10 border border-accentPurple/20 px-3 py-1.5 rounded-full flex items-center gap-2">
                Sync <i class="ph-bold ph-arrows-clockwise"></i>
            </div>
        </header>

        <main>

            <div
                class="sys-card border-teal m-0 relative overflow-hidden bg-gradient-to-br from-[#080A0E] to-[#020202] mb-5">
                <div
                    class="absolute -top-10 -right-10 w-32 h-32 bg-accentTeal/10 blur-3xl rounded-full pointer-events-none">
                </div>
                <button onclick="openSemesterModal()"
                    class="absolute top-4 right-4 text-[9px] font-black text-accentTeal bg-accentTeal/10 px-3 py-1.5 rounded-full border border-accentTeal/20 uppercase tracking-widest touch-btn backdrop-blur-sm z-20">Edit
                    Config</button>

                <div class="flex justify-between items-center mb-4 relative z-10 pr-20">
                    <h2 class="text-[11px] font-black text-gray-300 uppercase tracking-widest flex items-center gap-2">
                        <i
                            class="ph-fill ph-hourglass-high text-accentTeal text-lg drop-shadow-[0_0_5px_rgba(102,252,241,0.5)]"></i>
                        Semester Vector
                    </h2>
                </div>

                <div class="flex justify-between items-end mb-2 relative z-10">
                    <div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-0.5"><span
                                id="sem-start">--</span> to <span id="sem-end">--</span></p>
                        <span
                            class="text-[10px] font-black text-white uppercase tracking-widest px-2 py-0.5 bg-white/10 rounded border border-white/10"
                            id="sem-days-left">-- Days Left</span>
                    </div>
                    <h3 class="text-4xl font-black text-white leading-none drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]"
                        id="sem-pct-text">0%</h3>
                </div>

                <div class="h-1.5 bg-black rounded-full overflow-hidden border border-white/5 relative z-10 mt-3">
                    <div class="h-full bg-accentTeal shadow-[0_0_10px_rgba(102,252,241,1)] transition-all duration-1000"
                        id="sem-pct-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="mb-5">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-books text-accentPurple text-lg"></i> Subject Matrix
                    </h2>
                    <button onclick="openCourseModal()"
                        class="text-[10px] font-black text-accentPurple bg-accentPurple/10 px-3 py-1.5 rounded-full border border-accentPurple/20 uppercase tracking-widest touch-btn">
                        + Add Subject
                    </button>
                </div>
                <div id="course-list" class="space-y-2">
                </div>
            </div>

            <div class="mb-5">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-warning-circle text-accentRed text-lg"></i> Active Assignments
                    </h2>
                    <button onclick="openAssignmentModal()"
                        class="text-[10px] font-black text-accentRed bg-accentRed/10 px-3 py-1.5 rounded-full border border-accentRed/20 uppercase tracking-widest touch-btn">
                        + Add Task
                    </button>
                </div>
                <div id="assignment-list" class="space-y-2">
                </div>
            </div>

        </main>
    </div>

    <div class="modal-backdrop" id="modal-bg" onclick="closeModals()"></div>

    <div class="center-modal" id="semester-modal">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-black text-accentTeal uppercase tracking-widest">Timeline Config</h3>
            <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90 touch-btn"
                onclick="closeModals()"></i>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Semester
                    Start</label>
                <input type="date" id="input-sem-start" class="sys-input text-center text-accentTeal">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Semester
                    End</label>
                <input type="date" id="input-sem-end" class="sys-input text-center text-accentTeal">
            </div>
            <button onclick="submitSemester()"
                class="w-full bg-accentTeal text-black font-black text-xs uppercase tracking-widest rounded-xl touch-btn mt-4 py-4 shadow-[0_0_20px_rgba(102,252,241,0.5)]">Save
                Vector</button>
        </div>
    </div>

    <div class="center-modal" id="course-modal">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-black text-accentPurple uppercase tracking-widest" id="course-modal-title">Subject
                Config</h3>
            <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90 touch-btn"
                onclick="closeModals()"></i>
        </div>
        <div class="space-y-4">
            <input type="hidden" id="edit-course-id">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Course
                    Designation</label>
                <input type="text" id="input-course-name" class="sys-input" placeholder="e.g. Data Structures"
                    autocomplete="off">
            </div>

            <div class="bg-black p-4 rounded-xl border border-white/5">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Attendance
                        Target</label>
                    <span id="target-val" class="text-lg font-black text-accentPurple">75%</span>
                </div>
                <input type="range" id="input-course-target" class="text-accentPurple" min="0" max="100" value="75"
                    oninput="document.getElementById('target-val').innerText = this.value + '%'">
            </div>

            <div id="course-override-section" class="space-y-4" style="display: none;">
                <div class="bg-black p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Total Classes
                            Run</label>
                        <span id="total-val" class="text-lg font-black text-white">0</span>
                    </div>
                    <input type="number" id="input-course-total" class="sys-input mt-2"
                        oninput="document.getElementById('total-val').innerText = this.value || 0; syncAttendedMax();">
                </div>
                <div class="bg-black p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Classes
                            Attended</label>
                        <span id="attended-val" class="text-lg font-black text-accentPurple">0</span>
                    </div>
                    <input type="number" id="input-course-attended" class="sys-input text-accentPurple mt-2"
                        oninput="document.getElementById('attended-val').innerText = this.value || 0">
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <button id="btn-delete-course" onclick="deleteCourse()"
                    class="w-14 bg-accentRed/10 text-accentRed border border-accentRed/20 rounded-xl touch-btn"
                    style="display: none;"><i class="ph-bold ph-trash text-xl"></i></button>
                <button onclick="submitCourse()"
                    class="flex-1 bg-accentPurple text-white font-black text-xs uppercase tracking-widest rounded-xl touch-btn py-4 shadow-[0_0_20px_rgba(168,85,247,0.5)]">Save
                    Subject</button>
            </div>
        </div>
    </div>

    <div class="center-modal" id="assignment-modal">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-black text-accentRed uppercase tracking-widest" id="assignment-modal-title">Task
                Directive</h3>
            <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90 touch-btn"
                onclick="closeModals()"></i>
        </div>
        <div class="space-y-4">
            <input type="hidden" id="edit-assignment-id">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Task
                    Details</label>
                <input type="text" id="input-assignment-title" class="sys-input" placeholder="e.g. AI Project Report"
                    autocomplete="off">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Execution
                    Deadline</label>
                <input type="date" id="input-assignment-date" class="sys-input text-center text-accentRed">
            </div>
            <div class="flex gap-2 pt-2">
                <button id="btn-delete-assignment" onclick="deleteAssignment()"
                    class="w-14 bg-accentRed/10 text-accentRed border border-accentRed/20 rounded-xl touch-btn"
                    style="display: none;"><i class="ph-bold ph-trash text-xl"></i></button>
                <button onclick="submitAssignment()"
                    class="flex-1 bg-accentRed text-white font-black text-xs uppercase tracking-widest rounded-xl touch-btn py-4 shadow-[0_0_20px_rgba(255,76,76,0.5)]">Lock
                    Deadline</button>
            </div>
        </div>
    </div>

    <div id="sidebar-injector"></div>
    <script src="js/sidebar.js"></script>
    <script src="js/bottom-nav.js"></script>

    <script>
        // =========================================================================
        // ACADEMIC HUB LOGIC ENGINE (SYNCS DIRECTLY WITH INDEX.HTML LOCALSTORAGE)
        // =========================================================================

        // 1. Core Data Retrieval
        let semConfig = JSON.parse(localStorage.getItem('sys_semester_config')) || { start: '2026-01-01', end: '2026-06-01' };
        let courses = JSON.parse(localStorage.getItem('sys_courses')) || [];
        let deadlines = JSON.parse(localStorage.getItem('sys_deadlines')) || [];

        function saveAndRender() {
            localStorage.setItem('sys_semester_config', JSON.stringify(semConfig));
            localStorage.setItem('sys_courses', JSON.stringify(courses));
            localStorage.setItem('sys_deadlines', JSON.stringify(deadlines));
            renderDashboard();
            window.dispatchEvent(new Event('storage')); // Alert index.html to update automatically
        }

        // 2. Modal Management
        function closeModals() {
            document.getElementById('modal-bg').classList.remove('active');
            document.querySelectorAll('.center-modal').forEach(m => m.classList.remove('active'));
            document.body.style.overflow = '';
        }

        // --- Semester Setup ---
        function openSemesterModal() {
            document.getElementById('input-sem-start').value = semConfig.start;
            document.getElementById('input-sem-end').value = semConfig.end;
            document.getElementById('modal-bg').classList.add('active');
            document.getElementById('semester-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function submitSemester() {
            semConfig.start = document.getElementById('input-sem-start').value;
            semConfig.end = document.getElementById('input-sem-end').value;
            closeModals(); saveAndRender();
        }

        // --- Course/Subject Setup ---
        function openCourseModal(id = null) {
            document.getElementById('modal-bg').classList.add('active');
            document.getElementById('course-modal').classList.add('active');
            document.body.style.overflow = 'hidden';

            const overrideSection = document.getElementById('course-override-section');
            const delBtn = document.getElementById('btn-delete-course');

            if (id) {
                const c = courses.find(x => x.id === id);
                document.getElementById('course-modal-title').innerText = "Edit Subject";
                document.getElementById('edit-course-id').value = c.id;
                document.getElementById('input-course-name').value = c.name;
                document.getElementById('input-course-target').value = c.target;
                document.getElementById('target-val').innerText = c.target + '%';

                document.getElementById('input-course-total').value = c.total;
                document.getElementById('total-val').innerText = c.total;
                document.getElementById('input-course-attended').value = c.attended;
                document.getElementById('attended-val').innerText = c.attended;

                overrideSection.style.display = 'block';
                delBtn.style.display = 'block';
            } else {
                document.getElementById('course-modal-title').innerText = "Initialize Subject";
                document.getElementById('edit-course-id').value = '';
                document.getElementById('input-course-name').value = '';
                document.getElementById('input-course-target').value = '75';
                document.getElementById('target-val').innerText = '75%';

                overrideSection.style.display = 'none';
                delBtn.style.display = 'none';
            }
        }

        function submitCourse() {
            const id = document.getElementById('edit-course-id').value;
            const name = document.getElementById('input-course-name').value.trim();
            const target = parseInt(document.getElementById('input-course-target').value) || 75;

            if (!name) return;

            if (id) {
                let c = courses.find(x => x.id == id);
                c.name = name; c.target = target;
                c.total = parseInt(document.getElementById('input-course-total').value) || 0;
                c.attended = parseInt(document.getElementById('input-course-attended').value) || 0;
            } else {
                courses.push({ id: Date.now(), name, target, attended: 0, total: 0 });
            }
            closeModals(); saveAndRender();
        }

        function deleteCourse() {
            const id = document.getElementById('edit-course-id').value;
            courses = courses.filter(c => c.id != id);
            closeModals(); saveAndRender();
        }

        function logClass(id, isPresent, event) {
            event.stopPropagation();
            let c = courses.find(x => x.id == id);
            if (c) {
                c.total += 1;
                if (isPresent) c.attended += 1;
                saveAndRender();
            }
        }

        // --- Assignment/Directive Setup ---
        function openAssignmentModal(id = null) {
            document.getElementById('modal-bg').classList.add('active');
            document.getElementById('assignment-modal').classList.add('active');
            document.body.style.overflow = 'hidden';

            const delBtn = document.getElementById('btn-delete-assignment');

            if (id) {
                const d = deadlines.find(x => x.id === id);
                document.getElementById('assignment-modal-title').innerText = "Edit Directive";
                document.getElementById('edit-assignment-id').value = d.id;
                document.getElementById('input-assignment-title').value = d.title;
                document.getElementById('input-assignment-date').value = d.date;
                delBtn.style.display = 'block';
            } else {
                document.getElementById('assignment-modal-title').innerText = "New Directive";
                document.getElementById('edit-assignment-id').value = '';
                document.getElementById('input-assignment-title').value = '';
                document.getElementById('input-assignment-date').value = '';
                delBtn.style.display = 'none';
            }
        }

        function submitAssignment() {
            const id = document.getElementById('edit-assignment-id').value;
            const title = document.getElementById('input-assignment-title').value.trim();
            const date = document.getElementById('input-assignment-date').value;

            if (!title || !date) return;

            if (id) {
                let d = deadlines.find(x => x.id == id);
                d.title = title; d.date = date;
            } else {
                deadlines.push({ id: Date.now(), title, date });
            }
            closeModals(); saveAndRender();
        }

        function deleteAssignment() {
            const id = document.getElementById('edit-assignment-id').value;
            deadlines = deadlines.filter(d => d.id != id);
            closeModals(); saveAndRender();
        }

        function completeAssignment(id, event) {
            event.stopPropagation();
            deadlines = deadlines.filter(d => d.id != id);
            saveAndRender();
        }

        // 3. Dashboard UI Rendering
        function renderDashboard() {
            // Render Semester
            const now = new Date();
            const start = new Date(semConfig.start);
            const end = new Date(semConfig.end);
            const totalDays = (end - start) / (1000 * 60 * 60 * 24);
            const daysPassed = (now - start) / (1000 * 60 * 60 * 24);
            const daysLeft = Math.ceil(totalDays - daysPassed);
            let pct = Math.max(0, Math.min(100, (daysPassed / totalDays) * 100));

            document.getElementById('sem-start').innerText = isNaN(start) ? "--" : start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            document.getElementById('sem-end').innerText = isNaN(end) ? "--" : end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            document.getElementById('sem-days-left').innerText = daysLeft > 0 ? `${daysLeft} Days Left` : `Vector Complete`;
            document.getElementById('sem-pct-text').innerText = `${Math.round(pct || 0)}%`;
            document.getElementById('sem-pct-bar').style.width = `${pct || 0}%`;

            // Render Courses
            const courseList = document.getElementById('course-list');
            courseList.innerHTML = '';

            if (courses.length === 0) courseList.innerHTML = '<p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest text-center py-4 border border-white/5 rounded-xl border-dashed">No Subjects Logged.</p>';

            courses.forEach(c => {
                let currentPct = c.total === 0 ? 100 : Math.round((c.attended / c.total) * 100);
                let isSafe = currentPct >= c.target;
                let color = isSafe ? 'accentPurple' : 'accentRed';

                courseList.innerHTML += `
                    <div class="bg-[#080A0E] p-4 rounded-xl border-l-2 border-l-${color} border-y border-r border-white/5 relative overflow-hidden shadow-md cursor-pointer active:scale-95 transition" onclick="openCourseModal(${c.id})">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xs font-black text-white pr-10 uppercase tracking-wide truncate">${c.name}</h3>
                            <span class="text-xl font-black text-${color} leading-none drop-shadow-[0_0_5px_currentColor]">${currentPct}<span class="text-[10px] text-gray-500">%</span></span>
                        </div>
                        <div class="h-1.5 bg-black rounded-full overflow-hidden border border-white/5 mb-3">
                            <div class="h-full bg-${color} transition-all duration-500" style="width: ${currentPct}%"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Target: ${c.target}% | Attended: <span class="text-white">${c.attended}/${c.total}</span></p>
                            <div class="flex gap-2">
                                <button onclick="logClass(${c.id}, false, event)" class="w-8 h-8 rounded bg-accentRed/10 text-accentRed border border-accentRed/20 flex items-center justify-center hover:bg-accentRed/20 transition"><i class="ph-bold ph-x text-sm"></i></button>
                                <button onclick="logClass(${c.id}, true, event)" class="w-8 h-8 rounded bg-accentPurple/10 text-accentPurple border border-accentPurple/20 flex items-center justify-center hover:bg-accentPurple/20 transition"><i class="ph-bold ph-check text-sm"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Render Assignments
            const assignmentList = document.getElementById('assignment-list');
            assignmentList.innerHTML = '';

            if (deadlines.length === 0) assignmentList.innerHTML = '<p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest text-center py-4 border border-white/5 rounded-xl border-dashed">No Active Directives.</p>';

            deadlines.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(d => {
                const dateStr = new Date(d.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const daysUntil = (new Date(d.date) - now) / 86400000;
                let color = daysUntil <= 2 ? 'accentRed' : 'white';

                assignmentList.innerHTML += `
                    <div class="bg-black/80 p-3 rounded-xl border border-white/5 flex justify-between items-center cursor-pointer active:scale-95 transition" onclick="openAssignmentModal(${d.id})">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <button onclick="completeAssignment(${d.id}, event)" class="shrink-0 w-7 h-7 rounded border border-white/20 flex items-center justify-center text-gray-500 hover:text-accentTeal hover:border-accentTeal transition bg-black">
                                <i class="ph-bold ph-check text-xs opacity-0 hover:opacity-100"></i>
                            </button>
                            <p class="text-xs font-bold text-gray-200 truncate pr-2">${d.title}</p>
                        </div>
                        <span class="shrink-0 text-[9px] font-black text-${color} uppercase tracking-widest bg-${color}/10 px-2.5 py-1 rounded border border-${color}/20">${dateStr}</span>
                    </div>
                `;
            });
        }

        // Boot system
        window.onload = () => {
            renderDashboard();
            window.addEventListener('storage', () => {
                semConfig = JSON.parse(localStorage.getItem('sys_semester_config')) || { start: '2026-01-01', end: '2026-06-01' };
                courses = JSON.parse(localStorage.getItem('sys_courses')) || [];
                deadlines = JSON.parse(localStorage.getItem('sys_deadlines')) || [];
                renderDashboard();
            });
        };
    </script>
</body>

</html>
