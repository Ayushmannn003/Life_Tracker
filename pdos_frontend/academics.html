<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System OS | Academic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6',
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24',
                        cardBg: '#080A0E'
                    }
                }
            }
        }
    </script>
    <style>
        /* STRICT MOBILE LOCK */
        body,
        html {
            background-color: #000;
            color: #C5C6C7;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .mobile-viewport {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            background-color: #020202;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        main {
            padding: 1rem;
            flex: 1;
            padding-bottom: 6rem;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* SLEEKER CARD SYSTEM */
        .sys-card {
            background: #080A0E;
            border: 1px solid #14171F;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 0.5rem;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .sys-card:active {
            transform: scale(0.98);
        }

        /* SECTION HEADERS */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            padding: 0 0.25rem;
        }

        .section-divider {
            height: 1px;
            flex: 1;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            margin-left: 0.75rem;
        }

        /* CENTERED GLASS POPUPS */
        .center-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%) scale(0.95);
            width: 90%;
            max-width: 380px;
            background: rgba(8, 10, 14, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.75rem;
            padding: 1.5rem;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            max-height: 85vh;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .center-modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* CUSTOM INPUTS & SLIDERS */
        .sys-input {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }

        .sys-input:focus {
            border-color: #A855F7;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 15px 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #14171F;
            border-radius: 10px;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            box-shadow: 0 0 15px currentColor;
            border: 2px solid #000;
        }

        .touch-btn {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .touch-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>

    <div class="mobile-viewport">
        <header
            class="sticky top-0 p-6 pb-4 flex justify-between items-center z-50 bg-[#020202]/90 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center gap-4">
                <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                <h1 class="text-xl font-black text-white tracking-widest uppercase">Academic Hub</h1>
            </div>
            <button onclick="openDeadlineModal()"
                class="w-8 h-8 rounded-full bg-accentRed/10 text-accentRed flex items-center justify-center border border-accentRed/20 active:scale-90 transition">
                <i class="ph-bold ph-plus"></i>
            </button>
        </header>

        <main class="space-y-6">

            <div class="sys-card border-t-2 border-t-accentTeal m-0 relative overflow-hidden bg-gradient-to-br from-[#080A0E] to-[#020202]"
                onclick="openModal('semester-modal')">
                <div
                    class="absolute -top-10 -right-10 w-32 h-32 bg-accentTeal/10 blur-3xl rounded-full pointer-events-none">
                </div>
                <button
                    class="absolute top-4 right-4 text-[8px] font-black text-accentTeal bg-accentTeal/5 px-2.5 py-1 rounded-full border border-accentTeal/20 uppercase tracking-widest pointer-events-none backdrop-blur-sm">Edit</button>

                <div class="flex justify-between items-center mb-4 relative z-10">
                    <h2 class="text-[11px] font-black text-gray-300 uppercase tracking-widest flex items-center gap-2">
                        <i
                            class="ph-fill ph-hourglass-high text-accentTeal text-lg drop-shadow-[0_0_5px_rgba(102,252,241,0.5)]"></i>
                        Semester Vector
                    </h2>
                </div>

                <div class="flex justify-between items-end mb-2 relative z-10">
                    <div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-0.5"><span
                                id="sem-start-date">--</span> to <span id="sem-end-date">--</span></p>
                        <span
                            class="text-[10px] font-black text-white uppercase tracking-widest px-2 py-0.5 bg-white/10 rounded border border-white/10"
                            id="days-left-badge">-- Days Left</span>
                    </div>
                    <h3 class="text-4xl font-black text-white leading-none drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]"
                        id="sem-pct-text">0%</h3>
                </div>

                <div class="h-1.5 bg-black rounded-full overflow-hidden border border-white/5 relative z-10 mt-3">
                    <div class="h-full bg-accentTeal shadow-[0_0_10px_rgba(102,252,241,1)] transition-all duration-1000"
                        id="sem-pct-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="pt-2">
                <div class="section-header">
                    <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-warning-circle text-accentRed text-lg"></i> Directives
                    </h2>
                    <div class="section-divider"></div>
                    <button onclick="openDeadlineModal()"
                        class="text-[10px] font-black text-accentRed bg-accentRed/10 px-3 py-1.5 rounded-full border border-accentRed/20 uppercase tracking-widest touch-btn min-h-[28px] ml-2">
                        + Add
                    </button>
                </div>
                <div id="deadline-list" class="space-y-1.5">
                </div>
            </div>

            <div class="pt-2">
                <div class="section-header">
                    <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-student text-accentPurple text-lg"></i> Attendance
                    </h2>
                    <div class="section-divider"></div>
                    <button onclick="openCourseModal()"
                        class="text-[10px] font-black text-accentPurple bg-accentPurple/10 px-3 py-1.5 rounded-full border border-accentPurple/20 uppercase tracking-widest touch-btn min-h-[28px] ml-2">
                        + Add
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div
                        class="bg-black/50 p-3 rounded-xl border border-white/5 flex flex-col justify-center items-center">
                        <span class="text-xl font-black text-accentPurple leading-none" id="stat-safe">0</span>
                        <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-1">Safe
                            Zones</span>
                    </div>
                    <div
                        class="bg-black/50 p-3 rounded-xl border border-white/5 flex flex-col justify-center items-center">
                        <span
                            class="text-xl font-black text-accentRed leading-none drop-shadow-[0_0_5px_rgba(255,76,76,0.5)]"
                            id="stat-danger">0</span>
                        <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-1">Danger
                            Zones</span>
                    </div>
                </div>
                <div id="course-list" class="space-y-2">
                </div>
            </div>

            <div class="pt-2">
                <div class="section-header">
                    <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-code text-accentBlue text-lg"></i> Self-Study
                    </h2>
                    <div class="section-divider"></div>
                    <button onclick="openStudyModal()"
                        class="text-[10px] font-black text-accentBlue bg-accentBlue/10 px-3 py-1.5 rounded-full border border-accentBlue/20 uppercase tracking-widest touch-btn min-h-[28px] ml-2">
                        + Add
                    </button>
                </div>
                <div id="self-study-list" class="grid grid-cols-2 gap-2">
                </div>
            </div>

        </main>

        <div class="modal-backdrop" id="modal-bg" onclick="closeModals()"></div>

        <div class="center-modal" id="semester-modal">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-white uppercase tracking-widest">Configure Timeline</h3>
                <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90"
                    onclick="closeModals()"></i>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Start
                        Date</label>
                    <input type="date" id="sem-input-start"
                        class="sys-input text-center text-accentTeal tracking-widest text-lg">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">End
                        Date</label>
                    <input type="date" id="sem-input-end"
                        class="sys-input text-center text-accentTeal tracking-widest text-lg">
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar mt-3 pb-1">
                        <button onclick="setQuickDate('sem-input-end', 30)"
                            class="shrink-0 text-[10px] font-bold text-accentTeal bg-accentTeal/10 px-3 py-1.5 rounded-full border border-accentTeal/20">+1
                            Month</button>
                        <button onclick="setQuickDate('sem-input-end', 90)"
                            class="shrink-0 text-[10px] font-bold text-accentTeal bg-accentTeal/10 px-3 py-1.5 rounded-full border border-accentTeal/20">+3
                            Months</button>
                        <button onclick="setQuickDate('sem-input-end', 180)"
                            class="shrink-0 text-[10px] font-bold text-accentTeal bg-accentTeal/10 px-3 py-1.5 rounded-full border border-accentTeal/20">+6
                            Months</button>
                    </div>
                </div>
                <button onclick="submitSemester()"
                    class="w-full bg-accentTeal text-black font-black text-xs uppercase tracking-widest rounded-xl touch-btn mt-4 shadow-[0_0_20px_rgba(102,252,241,0.5)]">Save
                    Timeline</button>
            </div>
        </div>

        <div class="center-modal" id="course-modal">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-white uppercase tracking-widest" id="course-modal-title">Add Course
                </h3>
                <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90"
                    onclick="closeModals()"></i>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Course
                        Name</label>
                    <input type="text" id="course-name" class="sys-input" placeholder="e.g. Data Structures">
                </div>

                <div class="bg-black p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Target %</label>
                        <span id="target-val" class="text-lg font-black text-accentPurple">75%</span>
                    </div>
                    <input type="range" id="course-target" class="text-accentPurple" min="0" max="100" value="75"
                        oninput="document.getElementById('target-val').innerText = this.value + '%'">
                </div>

                <div class="course-override-fields space-y-4">
                    <div class="bg-black p-4 rounded-xl border border-white/5">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Total
                                Classes</label>
                            <span id="total-val" class="text-lg font-black text-white">0</span>
                        </div>
                        <input type="range" id="course-total" class="text-white" min="0" max="100" value="0"
                            oninput="document.getElementById('total-val').innerText = this.value; syncAttendedSlider();">
                    </div>
                    <div class="bg-black p-4 rounded-xl border border-white/5">
                        <div class="flex justify-between items-center">
                            <label
                                class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Attended</label>
                            <span id="attended-val" class="text-lg font-black text-accentPurple">0</span>
                        </div>
                        <input type="range" id="course-attended" class="text-accentPurple" min="0" max="100" value="0"
                            oninput="document.getElementById('attended-val').innerText = this.value">
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button id="course-delete-btn" onclick="deleteItem('course')"
                        class="w-14 bg-accentRed/10 text-accentRed border border-accentRed/20 rounded-xl touch-btn"
                        style="display: none;"><i class="ph-fill ph-trash text-xl"></i></button>
                    <button onclick="submitCourse()" id="course-submit-btn"
                        class="flex-1 bg-accentPurple text-white font-black text-xs uppercase tracking-widest rounded-xl touch-btn shadow-[0_0_20px_rgba(168,85,247,0.5)]">Save
                        Course</button>
                </div>
            </div>
        </div>

        <div class="center-modal" id="self-study-modal">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-white uppercase tracking-widest" id="study-modal-title">Add Topic
                </h3>
                <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90"
                    onclick="closeModals()"></i>
            </div>
            <div class="space-y-5">
                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Subject
                        Vector</label>
                    <input type="text" id="study-name" class="sys-input" placeholder="e.g. ML Math">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Target
                        Deadline</label>
                    <input type="date" id="study-date"
                        class="sys-input text-center text-accentBlue tracking-widest text-lg">
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar mt-3 pb-1">
                        <button onclick="setQuickDate('study-date', 1)"
                            class="shrink-0 text-[10px] font-bold text-accentBlue bg-accentBlue/10 px-3 py-1.5 rounded-full border border-accentBlue/20">Tomorrow</button>
                        <button onclick="setQuickDate('study-date', 3)"
                            class="shrink-0 text-[10px] font-bold text-accentBlue bg-accentBlue/10 px-3 py-1.5 rounded-full border border-accentBlue/20">+3
                            Days</button>
                        <button onclick="setQuickDate('study-date', 7)"
                            class="shrink-0 text-[10px] font-bold text-accentBlue bg-accentBlue/10 px-3 py-1.5 rounded-full border border-accentBlue/20">+1
                            Week</button>
                        <button onclick="setQuickDate('study-date', 30)"
                            class="shrink-0 text-[10px] font-bold text-accentBlue bg-accentBlue/10 px-3 py-1.5 rounded-full border border-accentBlue/20">+1
                            Month</button>
                    </div>
                </div>

                <div class="bg-black p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Total
                            Modules</label>
                        <span id="study-total-val" class="text-lg font-black text-white">10</span>
                    </div>
                    <input type="range" id="study-modules" class="text-white" min="1" max="100" value="10"
                        oninput="document.getElementById('study-total-val').innerText = this.value; syncStudySlider();">
                </div>
                <div class="study-override-fields bg-black p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Completed</label>
                        <span id="study-done-val" class="text-lg font-black text-accentBlue">0</span>
                    </div>
                    <input type="range" id="study-completed" class="text-accentBlue" min="0" max="10" value="0"
                        oninput="document.getElementById('study-done-val').innerText = this.value">
                </div>

                <div class="flex gap-3 pt-2">
                    <button id="study-delete-btn" onclick="deleteItem('study')"
                        class="w-14 bg-accentRed/10 text-accentRed border border-accentRed/20 rounded-xl touch-btn"
                        style="display: none;"><i class="ph-fill ph-trash text-xl"></i></button>
                    <button onclick="submitSelfStudy()" id="study-submit-btn"
                        class="flex-1 bg-accentBlue text-white font-black text-xs uppercase tracking-widest rounded-xl touch-btn shadow-[0_0_20px_rgba(59,130,246,0.5)]">Save
                        Vector</button>
                </div>
            </div>
        </div>

        <div class="center-modal" id="deadline-modal">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-white uppercase tracking-widest" id="deadline-modal-title">Add
                    Directive</h3>
                <i class="ph-bold ph-x text-xl text-gray-500 cursor-pointer p-1 active:scale-90"
                    onclick="closeModals()"></i>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Task
                        Designation</label>
                    <input type="text" id="deadline-title" class="sys-input" placeholder="e.g. IoT Report">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 pl-1">Due
                        Date</label>
                    <input type="date" id="deadline-date"
                        class="sys-input text-center text-accentRed tracking-widest text-lg">
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar mt-3 pb-1">
                        <button onclick="setQuickDate('deadline-date', 0)"
                            class="shrink-0 text-[10px] font-bold text-accentRed bg-accentRed/10 px-3 py-1.5 rounded-full border border-accentRed/20">Today</button>
                        <button onclick="setQuickDate('deadline-date', 1)"
                            class="shrink-0 text-[10px] font-bold text-accentRed bg-accentRed/10 px-3 py-1.5 rounded-full border border-accentRed/20">Tomorrow</button>
                        <button onclick="setQuickDate('deadline-date', 3)"
                            class="shrink-0 text-[10px] font-bold text-accentRed bg-accentRed/10 px-3 py-1.5 rounded-full border border-accentRed/20">+3
                            Days</button>
                        <button onclick="setQuickDate('deadline-date', 7)"
                            class="shrink-0 text-[10px] font-bold text-accentRed bg-accentRed/10 px-3 py-1.5 rounded-full border border-accentRed/20">+1
                            Week</button>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button id="deadline-delete-btn" onclick="deleteItem('deadline')"
                        class="w-14 bg-accentRed/10 text-accentRed border border-accentRed/20 rounded-xl touch-btn"
                        style="display: none;"><i class="ph-fill ph-trash text-xl"></i></button>
                    <button onclick="submitDeadline()" id="deadline-submit-btn"
                        class="flex-1 bg-accentRed text-white font-black text-xs uppercase tracking-widest rounded-xl touch-btn shadow-[0_0_20px_rgba(255,76,76,0.5)]">Save
                        Directive</button>
                </div>
            </div>
        </div>

    </div>

    <div id="sidebar-injector"></div>
    <script src="js/sidebar.js"></script>

    <script>
        // --- DATA ENGINE ---
        let courses = JSON.parse(localStorage.getItem('sys_courses')) || [];
        let deadlines = JSON.parse(localStorage.getItem('sys_deadlines')) || [];
        let selfStudies = JSON.parse(localStorage.getItem('sys_self_study')) || [];
        let semConfig = JSON.parse(localStorage.getItem('sys_semester_config')) || { start: '2026-01-01', end: '2026-06-01' };
        let editingId = null;

        function saveToLocal() {
            localStorage.setItem('sys_courses', JSON.stringify(courses));
            localStorage.setItem('sys_deadlines', JSON.stringify(deadlines));
            localStorage.setItem('sys_self_study', JSON.stringify(selfStudies));
            localStorage.setItem('sys_semester_config', JSON.stringify(semConfig));
            renderDashboard();
        }

        function setQuickDate(inputId, daysToAdd) {
            const date = new Date();
            date.setDate(date.getDate() + daysToAdd);
            document.getElementById(inputId).value = date.toISOString().split('T')[0];
        }

        function syncAttendedSlider() {
            let total = document.getElementById('course-total').value;
            let attended = document.getElementById('course-attended');
            attended.max = total;
            if (parseInt(attended.value) > parseInt(total)) attended.value = total;
            document.getElementById('attended-val').innerText = attended.value;
        }
        function syncStudySlider() {
            let total = document.getElementById('study-modules').value;
            let done = document.getElementById('study-completed');
            done.max = total;
            if (parseInt(done.value) > parseInt(total)) done.value = total;
            document.getElementById('study-done-val').innerText = done.value;
        }

        // --- CENTER MODAL CONTROLLERS ---
        function openModal(id) {
            document.getElementById('modal-bg').classList.add('active');
            document.getElementById(id).classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModals() {
            document.getElementById('modal-bg').classList.remove('active');
            document.querySelectorAll('.center-modal').forEach(sheet => sheet.classList.remove('active'));
            document.body.style.overflow = '';
            editingId = null;
        }

        function openCourseModal(id = null) {
            editingId = id;
            const overrideFields = document.querySelectorAll('.course-override-fields');
            if (id) {
                const c = courses.find(x => x.id === id);
                document.getElementById('course-modal-title').innerText = "Edit Course";
                document.getElementById('course-name').value = c.name;
                document.getElementById('course-target').value = c.target;
                document.getElementById('target-val').innerText = c.target + '%';
                document.getElementById('course-total').value = c.total;
                document.getElementById('total-val').innerText = c.total;

                let attendedSlider = document.getElementById('course-attended');
                attendedSlider.max = c.total || 100;
                attendedSlider.value = c.attended;
                document.getElementById('attended-val').innerText = c.attended;

                overrideFields.forEach(f => f.style.display = 'block');
                document.getElementById('course-delete-btn').style.display = 'flex';
                document.getElementById('course-submit-btn').innerText = 'Update';
            } else {
                document.getElementById('course-modal-title').innerText = "Initialize Course";
                document.getElementById('course-name').value = '';
                document.getElementById('course-target').value = '75';
                document.getElementById('target-val').innerText = '75%';
                overrideFields.forEach(f => f.style.display = 'none');
                document.getElementById('course-delete-btn').style.display = 'none';
                document.getElementById('course-submit-btn').innerText = 'Save';
            }
            openModal('course-modal');
        }

        function openStudyModal(id = null) {
            editingId = id;
            const overrideFields = document.querySelectorAll('.study-override-fields');
            if (id) {
                const s = selfStudies.find(x => x.id === id);
                document.getElementById('study-modal-title').innerText = "Edit Vector";
                document.getElementById('study-name').value = s.name;
                document.getElementById('study-date').value = s.date;
                document.getElementById('study-modules').value = s.totalMods;
                document.getElementById('study-total-val').innerText = s.totalMods;

                let doneSlider = document.getElementById('study-completed');
                doneSlider.max = s.totalMods;
                doneSlider.value = s.completedMods;
                document.getElementById('study-done-val').innerText = s.completedMods;

                overrideFields.forEach(f => f.style.display = 'block');
                document.getElementById('study-delete-btn').style.display = 'flex';
                document.getElementById('study-submit-btn').innerText = 'Update';
            } else {
                document.getElementById('study-modal-title').innerText = "Initialize Topic";
                document.getElementById('study-name').value = '';
                document.getElementById('study-date').value = '';
                document.getElementById('study-modules').value = '10';
                document.getElementById('study-total-val').innerText = '10';
                overrideFields.forEach(f => f.style.display = 'none');
                document.getElementById('study-delete-btn').style.display = 'none';
                document.getElementById('study-submit-btn').innerText = 'Save';
            }
            openModal('self-study-modal');
        }

        function openDeadlineModal(id = null) {
            editingId = id;
            if (id) {
                const d = deadlines.find(x => x.id === id);
                document.getElementById('deadline-modal-title').innerText = "Edit Directive";
                document.getElementById('deadline-title').value = d.title;
                document.getElementById('deadline-date').value = d.date;
                document.getElementById('deadline-delete-btn').style.display = 'flex';
                document.getElementById('deadline-submit-btn').innerText = 'Update';
            } else {
                document.getElementById('deadline-modal-title').innerText = "Add Directive";
                document.getElementById('deadline-title').value = '';
                document.getElementById('deadline-date').value = '';
                document.getElementById('deadline-delete-btn').style.display = 'none';
                document.getElementById('deadline-submit-btn').innerText = 'Save';
            }
            openModal('deadline-modal');
        }

        // --- SUBMIT PROCESSORS ---
        function submitSemester() {
            semConfig.start = document.getElementById('sem-input-start').value || semConfig.start;
            semConfig.end = document.getElementById('sem-input-end').value || semConfig.end;
            saveToLocal(); closeModals();
        }

        function submitCourse() {
            const name = document.getElementById('course-name').value.trim();
            const target = parseInt(document.getElementById('course-target').value) || 75;
            const attended = parseInt(document.getElementById('course-attended').value) || 0;
            const total = parseInt(document.getElementById('course-total').value) || 0;
            if (!name) return;

            if (editingId) {
                let c = courses.find(x => x.id === editingId);
                c.name = name; c.target = target; c.attended = attended; c.total = total;
            } else {
                courses.push({ id: Date.now(), name, target, attended: 0, total: 0 });
            }
            saveToLocal(); closeModals();
        }

        function submitSelfStudy() {
            const name = document.getElementById('study-name').value.trim();
            const date = document.getElementById('study-date').value;
            const totalMods = parseInt(document.getElementById('study-modules').value) || 1;
            const completedMods = parseInt(document.getElementById('study-completed').value) || 0;
            if (!name || !date) return;

            if (editingId) {
                let s = selfStudies.find(x => x.id === editingId);
                s.name = name; s.date = date; s.totalMods = totalMods; s.completedMods = completedMods;
            } else {
                selfStudies.push({ id: Date.now(), name, date, totalMods, completedMods: 0 });
            }
            saveToLocal(); closeModals();
        }

        function submitDeadline() {
            const title = document.getElementById('deadline-title').value.trim();
            const date = document.getElementById('deadline-date').value;
            if (!title || !date) return;

            if (editingId) {
                let d = deadlines.find(x => x.id === editingId);
                d.title = title; d.date = date;
            } else {
                deadlines.push({ id: Date.now(), title, date, status: 'active' });
            }
            saveToLocal(); closeModals();
        }

        function deleteItem(type) {
            if (type === 'course') courses = courses.filter(c => c.id !== editingId);
            if (type === 'study') selfStudies = selfStudies.filter(s => s.id !== editingId);
            if (type === 'deadline') deadlines = deadlines.filter(d => d.id !== editingId);
            saveToLocal(); closeModals();
        }

        function logClass(id, isPresent, event) {
            event.stopPropagation();
            let c = courses.find(x => x.id === id);
            if (c) {
                c.total += 1;
                if (isPresent) c.attended += 1;
                saveToLocal();
            }
        }

        function logModule(id, event) {
            event.stopPropagation();
            let s = selfStudies.find(x => x.id === id);
            if (s && s.completedMods < s.totalMods) {
                s.completedMods += 1;
                saveToLocal();
            }
        }

        function completeDeadline(id, event) {
            event.stopPropagation();
            deadlines = deadlines.filter(d => d.id !== id);
            saveToLocal();
        }

        // --- RENDER UI ---
        function renderDashboard() {
            const now = new Date();
            const start = new Date(semConfig.start);
            const end = new Date(semConfig.end);
            const totalDays = (end - start) / (1000 * 60 * 60 * 24);
            const daysPassed = (now - start) / (1000 * 60 * 60 * 24);
            const daysLeft = Math.ceil(totalDays - daysPassed);
            let pct = Math.max(0, Math.min(100, (daysPassed / totalDays) * 100));

            document.getElementById('sem-start-date').innerText = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            document.getElementById('sem-end-date').innerText = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            document.getElementById('days-left-badge').innerText = daysLeft > 0 ? `${daysLeft} Days Left` : `Complete`;
            document.getElementById('sem-pct-text').innerText = `${Math.round(pct)}%`;
            document.getElementById('sem-pct-bar').style.width = `${pct}%`;

            let safeCount = 0; let dangerCount = 0;
            const courseContainer = document.getElementById('course-list');
            courseContainer.innerHTML = '';

            if (courses.length === 0) courseContainer.innerHTML = '<p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest text-center py-4 border border-white/5 rounded-xl border-dashed">No Courses Linked</p>';

            courses.forEach(c => {
                let currentPct = c.total === 0 ? 100 : Math.round((c.attended / c.total) * 100);
                let isSafe = currentPct >= c.target;
                if (c.total > 0) { isSafe ? safeCount++ : dangerCount++; }
                let color = isSafe ? 'accentPurple' : 'accentRed';

                courseContainer.innerHTML += `
                    <div class="sys-card m-0 border-l-2 border-l-${color}" onclick="openCourseModal(${c.id})">
                        <button class="absolute top-3 right-3 text-[8px] font-black text-${color} bg-${color}/10 px-2 py-0.5 rounded border border-${color}/20 uppercase tracking-widest pointer-events-none">Edit</button>
                        <div class="flex justify-between items-start mb-1.5">
                            <h3 class="text-xs font-black text-white leading-tight pr-10">${c.name}</h3>
                            <span class="text-lg font-black text-${color} leading-none mt-1">${currentPct}<span class="text-[9px] text-gray-500">%</span></span>
                        </div>
                        <div class="h-1 bg-[#020202] rounded-full overflow-hidden border border-white/5 mb-2.5">
                            <div class="h-full bg-${color} shadow-[0_0_8px_currentColor] transition-all duration-500" style="width: ${currentPct}%"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">T: ${c.target}% | <span class="text-white">${c.attended}/${c.total}</span></p>
                            <div class="flex gap-1.5">
                                <button onclick="logClass(${c.id}, false, event)" class="w-7 h-7 rounded bg-accentRed/10 text-accentRed border border-accentRed/20 flex items-center justify-center active:scale-90 transition"><i class="ph-bold ph-x text-xs"></i></button>
                                <button onclick="logClass(${c.id}, true, event)" class="w-7 h-7 rounded bg-accentPurple/10 text-accentPurple border border-accentPurple/20 flex items-center justify-center active:scale-90 transition"><i class="ph-bold ph-check text-xs"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('stat-safe').innerText = safeCount;
            document.getElementById('stat-danger').innerText = dangerCount;

            const studyContainer = document.getElementById('self-study-list');
            studyContainer.innerHTML = '';
            if (selfStudies.length === 0) studyContainer.innerHTML = '<div class="col-span-2 text-[10px] text-gray-600 font-bold uppercase tracking-widest text-center py-4 border border-white/5 rounded-xl border-dashed">No Active Vectors</div>';

            selfStudies.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(s => {
                let modPct = Math.round((s.completedMods / s.totalMods) * 100);
                const dateStr = new Date(s.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                studyContainer.innerHTML += `
                    <div class="sys-card m-0 p-3 border-t-2 border-t-accentBlue relative flex flex-col justify-between" onclick="openStudyModal(${s.id})">
                        <button class="absolute top-2 right-2 text-[8px] font-black text-accentBlue bg-accentBlue/10 px-1.5 py-0.5 rounded border border-accentBlue/20 uppercase tracking-widest pointer-events-none">Edit</button>
                        <div>
                            <h3 class="text-[11px] font-black text-white leading-tight pr-6 mb-1 truncate">${s.name}</h3>
                            <p class="text-[8px] font-black text-accentBlue uppercase tracking-widest mb-2">${dateStr}</p>
                        </div>
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-white text-[10px] font-bold">${s.completedMods}<span class="text-gray-600">/${s.totalMods}</span></span>
                                <p class="text-[10px] font-black text-accentBlue">${modPct}%</p>
                            </div>
                            <div class="h-1 bg-[#020202] rounded-full overflow-hidden border border-white/5 mb-2">
                                <div class="h-full bg-accentBlue transition-all duration-500" style="width: ${modPct}%"></div>
                            </div>
                            <button onclick="logModule(${s.id}, event)" class="w-full bg-accentBlue/10 text-accentBlue border border-accentBlue/20 font-black text-[9px] uppercase tracking-widest py-1.5 rounded active:scale-95 transition">
                                +1 Mod
                            </button>
                        </div>
                    </div>
                `;
            });

            const deadlineContainer = document.getElementById('deadline-list');
            deadlineContainer.innerHTML = '';
            if (deadlines.length === 0) deadlineContainer.innerHTML = '<p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest text-center py-4 border border-white/5 rounded-xl border-dashed">No Active Directives</p>';

            deadlines.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(d => {
                const dateStr = new Date(d.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const isUrgent = (new Date(d.date) - new Date()) / 86400000 <= 2;
                let color = isUrgent ? 'accentRed' : 'white';

                deadlineContainer.innerHTML += `
                    <div class="bg-black/80 p-2.5 rounded-xl border border-white/5 flex justify-between items-center cursor-pointer active:scale-95 transition" onclick="openDeadlineModal(${d.id})">
                        <div class="flex items-center gap-2.5 overflow-hidden">
                            <button onclick="completeDeadline(${d.id}, event)" class="shrink-0 w-6 h-6 rounded border border-white/10 flex items-center justify-center text-gray-600 hover:text-accentTeal hover:border-accentTeal active:scale-90 transition bg-black">
                                <i class="ph-bold ph-check text-[10px] opacity-0 hover:opacity-100"></i>
                            </button>
                            <p class="text-[11px] font-bold text-gray-200 truncate pr-2">${d.title}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="shrink-0 text-[9px] font-black text-${color} uppercase tracking-widest bg-${color}/10 px-2 py-1 rounded border border-${color}/20">${dateStr}</span>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('sem-input-start').value = semConfig.start;
        document.getElementById('sem-input-end').value = semConfig.end;
        window.onload = renderDashboard;
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('System OS Service Worker registered!', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
