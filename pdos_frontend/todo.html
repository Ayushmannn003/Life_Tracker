<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Task Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#020202', accentTeal: '#66FCF1', accentRed: '#FF4C4C', accentYellow: '#FFD700', accentBlue: '#3B82F6' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        ::-webkit-scrollbar { display: none; }
        .mobile-viewport { width: 100%; max-width: 430px; height: 100dvh; position: relative; background-color: #020202; overflow: hidden; display: flex; flex-direction: column; }
        .task-bg { background-image: url('https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; position: absolute; inset: 0; opacity: 0.15; z-index: 1; }
        .vignette { background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 70%, #000 100%); position: absolute; inset: 0; z-index: 2; }
        .content-layer { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; }
        .glass-panel { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .task-input { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; color: white; outline: none; font-size: 13px; }
        .check-circle { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .check-circle.done { background: #66FCF1; border-color: #66FCF1; }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <div class="task-bg"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            <div id="sidebar-injector"></div>

            <header class="p-6 pb-2 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:text-accentTeal transition"></i>
                    <h1 class="text-xl font-bold text-white tracking-widest uppercase">Task Engine</h1>
                </div>
                <div class="text-[9px] font-black text-accentTeal bg-accentTeal/5 border border-accentTeal/20 px-3 py-1 rounded-full">APRIL 2026</div>
            </header>

            <main class="flex-1 overflow-y-auto p-5 space-y-6 pb-24">
                
                <div class="glass-panel p-5 rounded-[2.5rem] grid grid-cols-3 gap-2 text-center">
                    <div>
                        <p class="text-[8px] font-black text-gray-500 uppercase tracking-tighter mb-1">Pending</p>
                        <p id="stat-pending" class="text-xl font-black text-white">0</p>
                    </div>
                    <div class="border-x border-white/5">
                        <p class="text-[8px] font-black text-accentRed uppercase tracking-tighter mb-1">Ongoing</p>
                        <p id="stat-ongoing" class="text-xl font-black text-white">0</p>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-accentTeal uppercase tracking-tighter mb-1">Done</p>
                        <p id="stat-done" class="text-xl font-black text-white">0</p>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-[2.5rem] space-y-4">
                    <input type="text" id="task-name" placeholder="Define Objective..." class="w-full task-input">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="task-priority" class="task-input">
                            <option value="low">Low Priority</option>
                            <option value="medium">Medium</option>
                            <option value="high">Critical</option>
                        </select>
                        <button onclick="addTask()" class="bg-accentTeal text-black font-black rounded-xl text-[10px] uppercase tracking-widest active:scale-95 transition-all shadow-xl">Deploy</button>
                    </div>
                </div>

                <div id="ledger-container" class="space-y-8">
                    </div>

            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        const SYSTEM_TODAY = "2026-04-04";
        let tasks = JSON.parse(localStorage.getItem('ledger_tasks')) || [];

        function addTask() {
            const name = document.getElementById('task-name').value;
            const priority = document.getElementById('task-priority').value;
            if (!name) return;

            tasks.push({
                id: Date.now(),
                name: name,
                priority: priority,
                done: false,
                date: SYSTEM_TODAY
            });

            syncAndRender();
            document.getElementById('task-name').value = '';
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) { task.done = !task.done; syncAndRender(); }
        }

        function deleteTask(id) {
            if(confirm("Purge this objective?")) { tasks = tasks.filter(t => t.id !== id); syncAndRender(); }
        }

        function syncAndRender() {
            localStorage.setItem('ledger_tasks', JSON.stringify(tasks));
            render();
        }

        function render() {
            const container = document.getElementById('ledger-container');
            container.innerHTML = '';

            // Update Top Analytics
            const doneCount = tasks.filter(t => t.done).length;
            const ongoingCount = tasks.filter(t => !t.done && t.priority === 'high').length;
            const pendingCount = tasks.filter(t => !t.done && t.priority !== 'high').length;

            document.getElementById('stat-done').innerText = doneCount;
            document.getElementById('stat-ongoing').innerText = ongoingCount;
            document.getElementById('stat-pending').innerText = pendingCount;

            // Group tasks by date
            const groups = tasks.reduce((acc, t) => {
                acc[t.date] = [...(acc[t.date] || []), t];
                return acc;
            }, {});

            // Render groups (Newest date first)
            Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
                const section = document.createElement('section');
                section.className = "space-y-3";
                
                const isToday = date === SYSTEM_TODAY;
                const dateLabel = isToday ? "TODAY'S LOG" : date.toUpperCase();

                section.innerHTML = `
                    <div class="flex items-center gap-3 px-2">
                        <span class="text-[9px] font-black text-gray-600 uppercase tracking-[0.3em]">${dateLabel}</span>
                        <div class="flex-1 h-[1px] bg-white/5"></div>
                    </div>
                    <div class="space-y-3">
                        ${groups[date].map(t => `
                            <div class="glass-panel p-4 rounded-2xl flex items-center justify-between group">
                                <div class="flex items-center gap-4">
                                    <div onclick="toggleTask(${t.id})" class="check-circle ${t.done ? 'done' : ''}">
                                        ${t.done ? '<i class="ph-bold ph-check text-black text-[10px]"></i>' : ''}
                                    </div>
                                    <div>
                                        <h4 class="text-sm font-semibold text-white ${t.done ? 'line-through text-gray-600' : ''}">${t.name}</h4>
                                        <p class="text-[8px] font-black uppercase tracking-widest ${t.priority === 'high' ? 'text-accentRed' : 'text-gray-500'} mt-0.5">
                                            ${t.priority}
                                        </p>
                                    </div>
                                </div>
                                <button onclick="deleteTask(${t.id})" class="text-gray-800 hover:text-red-500 transition-colors">
                                    <i class="ph ph-trash text-lg"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        window.onload = render;
    </script>
</body>
</html>
