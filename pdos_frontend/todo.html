<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System OS | Task Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24',
                        accentGreen: '#00E676', cardBg: '#080A0E' 
                    }
                }
            }
        }
    </script>
    <style>
        /* STRICT MOBILE LOCK */
        body, html { 
            background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        .mobile-viewport { 
            width: 100%; max-width: 430px; margin: 0 auto; position: relative; 
            background-color: #020202; height: 100%; display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        main { padding: 1.25rem; flex: 1; overflow-y: auto; padding-bottom: 9rem; display: flex; flex-direction: column; gap: 1.5rem; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .touch-btn { transition: transform 0.1s; cursor: pointer; }
        .touch-btn:active { transform: scale(0.96); }

        /* DEEP GLASS CARDS */
        .sys-card { 
            background: linear-gradient(145deg, #0A0C12 0%, #050608 100%); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem;
            padding: 1.25rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .border-teal { border-top: 2px solid #66FCF1; }

        /* INPUTS */
        .sys-input {
            background: #000; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem; padding: 1rem; color: #fff; font-size: 13px; font-weight: 600;
            outline: none; transition: border-color 0.2s; width: 100%;
        }
        .sys-input:focus { border-color: #66FCF1; }

        .task-done { opacity: 0.4; text-decoration: line-through; }
        .checkbox-custom { transition: all 0.2s; }
        .checkbox-custom:active { transform: scale(0.8); }

        /* MODAL ANIMATION */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[10000] hidden items-center justify-center p-4">
        <div id="confirm-modal" class="sys-card border-teal w-full max-w-[320px] hidden flex-col gap-4 text-center modal-enter">
            <i class="ph-fill ph-warning-circle text-4xl text-accentTeal mx-auto mt-2 drop-shadow-[0_0_8px_rgba(102,252,241,0.5)]"></i>
            <h2 id="confirm-message" class="text-sm font-bold text-white tracking-wide mt-1 mb-2">Are you sure?</h2>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 rounded-xl bg-white/5 border border-white/10 text-[10px] font-black text-gray-400 uppercase tracking-widest touch-btn hover:text-white">Cancel</button>
                <button id="confirm-btn" class="flex-1 py-3 rounded-xl bg-accentTeal text-black text-[10px] font-black uppercase tracking-widest touch-btn shadow-[0_0_10px_rgba(102,252,241,0.3)]">Confirm</button>
            </div>
        </div>
    </div>

    <div class="mobile-viewport">
        <header class="p-6 pb-2 flex justify-between items-center z-50 bg-[#020202]/90 backdrop-blur-xl shrink-0">
            <div class="flex items-center gap-4">
                <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                <h1 class="text-xl font-black text-white tracking-widest uppercase">Task Protocol</h1>
            </div>
            <div class="text-[10px] font-black text-accentTeal bg-accentTeal/10 border border-accentTeal/20 px-3 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-accentTeal animate-pulse shadow-[0_0_5px_#66FCF1]"></div> ACTIVE
            </div>
        </header>

        <main>
            <div class="sys-card border-teal relative shrink-0">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2">
                        <i class="ph-fill ph-crosshair text-accentTeal text-lg drop-shadow-[0_0_5px_rgba(102,252,241,0.5)]"></i>
                        <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Execution Load</h2>
                    </div>
                    <button onclick="purgeCompleted()" class="text-[9px] font-black text-gray-500 uppercase tracking-widest px-2 py-1 border border-white/10 rounded hover:text-white transition touch-btn bg-white/5">
                        Purge Cleared
                    </button>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div>
                        <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">Pending Tasks</p>
                        <h1 class="text-3xl font-black text-white" id="pending-count">0</h1>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">Est. Focus Time</p>
                        <h1 class="text-3xl font-black text-accentTeal" id="pending-time">0h 0m</h1>
                    </div>
                </div>

                <div class="mt-4 h-1 bg-white/5 rounded-full overflow-hidden w-full relative">
                    <div class="h-full bg-accentTeal transition-all duration-700 shadow-[0_0_10px_#66FCF1]" id="progress-bar" style="width: 0%"></div>
                </div>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-2 text-right" id="progress-text">0% Complete</p>
            </div>

            <div class="sys-card border-blue relative shrink-0">
                <form onsubmit="addTask(event)" class="flex flex-col gap-3 relative z-10">
                    <input type="text" id="task-title" class="sys-input py-3 text-sm" placeholder="Define target vector..." autocomplete="off" required>
                    <div class="flex gap-2">
                        <select id="task-tag" class="sys-input py-3 w-1/2 text-[11px] uppercase tracking-wider text-gray-300">
                            <option value="Academic">📚 Academic</option>
                            <option value="Project">💻 Project</option>
                            <option value="Admin">⚙️ Admin</option>
                            <option value="Life">🧘 Life</option>
                        </select>
                        <select id="task-time" class="sys-input py-3 w-1/2 text-[11px] uppercase tracking-wider text-gray-300">
                            <option value="15">⏱️ 15 Min</option>
                            <option value="30">⏱️ 30 Min</option>
                            <option value="60">⏱️ 1 Hour</option>
                            <option value="120">⏱️ 2 Hours</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-accentTeal text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest touch-btn shadow-[0_0_15px_rgba(102,252,241,0.3)] mt-1">
                        Queue Target
                    </button>
                </form>
            </div>

            <div>
                <h3 class="px-4 text-[9px] font-black text-gray-600 uppercase tracking-[0.2em] mb-3">Protocol Queue</h3>
                <div id="task-container" class="flex flex-col gap-2">
                    </div>
            </div>

        </main>
    </div>

    <div id="sidebar-injector"></div>
    <script src="js/sidebar.js"></script>
    <script src="js/bottom-nav.js"></script>

    <script>
        // =========================================================================
        // TASK PROTOCOL ENGINE
        // =========================================================================

        // --- CUSTOM MODAL SYSTEM ---
        let pendingConfirmAction = null;

        function openModalContainer(targetModalId) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.add('flex');
            document.getElementById(targetModalId).classList.remove('hidden');
            document.getElementById(targetModalId).classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-overlay').classList.remove('flex');
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
            pendingConfirmAction = null;
        }

        function triggerConfirm(message, callback) {
            document.getElementById('confirm-message').innerText = message;
            pendingConfirmAction = callback;
            openModalContainer('confirm-modal');
        }

        document.getElementById('confirm-btn').onclick = () => {
            if (pendingConfirmAction) pendingConfirmAction();
            closeModal();
        };

        // --- CORE TASK LOGIC ---
        function getTagColor(tag) {
            switch(tag) {
                case 'Academic': return 'text-accentPurple border-accentPurple/30 bg-accentPurple/10';
                case 'Project': return 'text-accentBlue border-accentBlue/30 bg-accentBlue/10';
                case 'Admin': return 'text-gray-400 border-gray-600 bg-white/5';
                case 'Life': return 'text-accentGreen border-accentGreen/30 bg-accentGreen/10';
                default: return 'text-accentTeal border-accentTeal/30 bg-accentTeal/10';
            }
        }

        function formatTime(minutes) {
            if (minutes < 60) return `${minutes}m`;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }

        function loadTasks() {
            const todos = JSON.parse(localStorage.getItem('sys_todos')) || [];
            const container = document.getElementById('task-container');
            
            let totalPending = 0;
            let totalMinutes = 0;
            let completedCount = 0;
            let html = '';

            if (todos.length === 0) {
                container.innerHTML = `<div class="text-center py-8 border border-dashed border-white/10 rounded-2xl bg-black/40 text-[9px] font-black text-gray-600 uppercase tracking-widest">Queue is empty.</div>`;
            } else {
                // Render uncompleted first, then completed
                const sortedTodos = [...todos].sort((a, b) => a.completed === b.completed ? 0 : a.completed ? 1 : -1);

                sortedTodos.forEach(t => {
                    if (t.completed) {
                        completedCount++;
                    } else {
                        totalPending++;
                        totalMinutes += parseInt(t.time || 0);
                    }

                    const tagClass = getTagColor(t.tag);
                    const icon = t.completed ? `<i class="ph-fill ph-check-square text-accentTeal text-2xl drop-shadow-[0_0_5px_rgba(102,252,241,0.5)]"></i>` : `<i class="ph-bold ph-square text-gray-500 text-2xl"></i>`;
                    const textClass = t.completed ? 'task-done text-gray-500' : 'text-white';
                    
                    html += `
                        <div class="bg-black/40 border ${t.completed ? 'border-white/5' : 'border-white/10'} p-3 rounded-xl flex justify-between items-center transition-all">
                            <div class="flex items-center gap-3 overflow-hidden cursor-pointer w-[80%]" onclick="toggleTask(${t.id})">
                                <div class="checkbox-custom shrink-0 mt-0.5">
                                    ${icon}
                                </div>
                                <div class="truncate">
                                    <p class="text-sm font-bold ${textClass} truncate">${t.text}</p>
                                    <div class="flex gap-2 mt-1">
                                        <span class="text-[8px] font-black uppercase tracking-widest px-1.5 py-0.5 rounded border ${tagClass}">${t.tag || 'Task'}</span>
                                        <span class="text-[8px] font-black uppercase tracking-widest px-1.5 py-0.5 rounded border border-white/10 text-gray-400 bg-white/5 flex items-center gap-1"><i class="ph-bold ph-clock"></i> ${formatTime(t.time || 15)}</span>
                                    </div>
                                </div>
                            </div>
                            <button onclick="deleteTask(${t.id})" class="text-gray-600 hover:text-accentRed transition p-2 shrink-0 active:scale-90"><i class="ph-bold ph-trash text-lg"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            // Update Execution Estimator Metrics
            document.getElementById('pending-count').innerText = totalPending;
            document.getElementById('pending-time').innerText = formatTime(totalMinutes);

            const totalTasks = todos.length;
            const progressPct = totalTasks === 0 ? 0 : Math.round((completedCount / totalTasks) * 100);
            
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
            document.getElementById('progress-text').innerText = `${progressPct}% Yield`;
        }

        function addTask(e) {
            e.preventDefault();
            const titleInput = document.getElementById('task-title');
            const tagInput = document.getElementById('task-tag');
            const timeInput = document.getElementById('task-time');
            
            const text = titleInput.value.trim();
            if (!text) return;

            const todos = JSON.parse(localStorage.getItem('sys_todos')) || [];
            
            todos.push({
                id: Date.now(),
                text: text,
                tag: tagInput.value,
                time: timeInput.value,
                completed: false
            });

            localStorage.setItem('sys_todos', JSON.stringify(todos));
            
            titleInput.value = '';
            titleInput.blur();
            loadTasks();
            
            // Ping Analyzer Hub & Dashboard to Sync Changes instantly
            window.dispatchEvent(new Event('storage'));
        }

        function toggleTask(id) {
            let todos = JSON.parse(localStorage.getItem('sys_todos')) || [];
            const taskIndex = todos.findIndex(t => t.id === id);
            
            if (taskIndex > -1) {
                todos[taskIndex].completed = !todos[taskIndex].completed;
                localStorage.setItem('sys_todos', JSON.stringify(todos));
                loadTasks();
                window.dispatchEvent(new Event('storage'));
            }
        }

        function deleteTask(id) {
            let todos = JSON.parse(localStorage.getItem('sys_todos')) || [];
            todos = todos.filter(t => t.id !== id);
            localStorage.setItem('sys_todos', JSON.stringify(todos));
            loadTasks();
            window.dispatchEvent(new Event('storage'));
        }

        function purgeCompleted() {
            let todos = JSON.parse(localStorage.getItem('sys_todos')) || [];
            const clearedCount = todos.filter(t => t.completed).length;
            
            if (clearedCount === 0) return;

            triggerConfirm(`Purge ${clearedCount} completed task(s) from the protocol?`, () => {
                todos = todos.filter(t => !t.completed);
                localStorage.setItem('sys_todos', JSON.stringify(todos));
                loadTasks();
                window.dispatchEvent(new Event('storage'));
            });
        }

        window.onload = loadTasks;
        window.addEventListener('storage', loadTasks);
    </script>
</body>
</html>
