<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System OS | Weekly Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24',
                        accentGreen: '#00E676', cardBg: '#080A0E' 
                    }
                }
            }
        }
    </script>
    <style>
        /* STRICT MOBILE LOCK */
        body, html { 
            background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        .mobile-viewport { 
            width: 100%; max-width: 430px; margin: 0 auto; position: relative; 
            background-color: #020202; height: 100%; display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden;
        }
        
        /* pb-[8rem] ensures content never hides behind the floating button or nav bar */
        main { padding: 1.25rem; flex: 1; overflow-y: auto; padding-bottom: 8rem; display: flex; flex-direction: column; gap: 1rem; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .touch-btn { transition: transform 0.1s; cursor: pointer; }
        .touch-btn:active { transform: scale(0.96); }

        /* DEEP GLASS CARDS */
        .sys-card { 
            background: linear-gradient(145deg, #0A0C12 0%, #050608 100%); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem;
            padding: 1.25rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .border-blue { border-top: 2px solid #3B82F6; }

        /* INPUTS */
        .sys-input {
            background: #000; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem; padding: 1rem; color: #fff; font-size: 13px; font-weight: 600;
            outline: none; transition: border-color 0.2s; width: 100%;
        }
        .sys-input:focus { border-color: #3B82F6; }

        /* MODAL ANIMATION */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* HIDE NATIVE TIME PICKER ICON ON MOBILE */
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }

        /* DAY SELECTOR PILLS */
        .day-pill { padding: 0.5rem 1rem; border-radius: 1rem; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #6B7280; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; white-space: nowrap; }
        .day-pill.active { background: rgba(59,130,246,0.1); color: #3B82F6; border-color: rgba(59,130,246,0.3); }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        
        <div id="modal-overlay" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-[10000] hidden items-center justify-center p-4">
            <div id="block-modal" class="sys-card border-blue w-full max-w-[320px] flex flex-col gap-4 modal-enter shadow-[0_0_50px_rgba(0,0,0,0.9)]">
                <div class="flex justify-between items-center mb-1">
                    <h2 class="text-xs font-black text-white uppercase tracking-widest">Allocate Block</h2>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-white touch-btn"><i class="ph-bold ph-x text-lg"></i></button>
                </div>
                
                <input type="text" id="block-title" class="sys-input" placeholder="Block Title (e.g. Deep Work)">
                
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-[8px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-1 block">Start Time</label>
                        <input type="time" id="block-start" class="sys-input text-sm">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[8px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-1 block">End Time</label>
                        <input type="time" id="block-end" class="sys-input text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[8px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-1 block">Category</label>
                    <select id="block-category" class="sys-input text-[11px] uppercase tracking-wider text-gray-300">
                        <option value="Deep Work">🔵 Focus / Deep Work</option>
                        <option value="Class">🟣 University / Class</option>
                        <option value="Review">🟡 Academic Review</option>
                        <option value="Life">🟢 Maintenance / Life</option>
                        <option value="Urgent">🔴 Urgent Vector</option>
                    </select>
                </div>

                <button onclick="saveBlock()" class="w-full py-3 mt-2 rounded-xl bg-accentBlue text-white text-[10px] font-black uppercase tracking-widest touch-btn shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    <i class="ph-bold ph-lock-key mr-1"></i> Lock to Matrix
                </button>
            </div>
        </div>

        <header class="p-6 pb-2 flex justify-between items-center z-50 bg-[#020202]/90 backdrop-blur-xl shrink-0">
            <div class="flex items-center gap-4">
                <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                <h1 class="text-xl font-black text-white tracking-widest uppercase">Weekly Matrix</h1>
            </div>
            <div class="text-[10px] font-black text-accentBlue bg-accentBlue/10 border border-accentBlue/20 px-3 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-accentBlue animate-pulse shadow-[0_0_5px_#3B82F6]"></div> TIME-BLOCK
            </div>
        </header>

        <div class="w-full overflow-x-auto py-3 px-4 flex gap-2 border-b border-white/5 shrink-0 bg-[#020202] z-40" id="day-nav">
            </div>

        <main id="matrix-container">
            </main>

        <button onclick="openModal()" class="absolute bottom-24 right-6 w-14 h-14 bg-accentBlue rounded-full shadow-[0_0_20px_rgba(59,130,246,0.4)] flex items-center justify-center text-black text-2xl z-40 touch-btn border-2 border-black">
            <i class="ph-bold ph-plus"></i>
        </button>

    </div>

    <div id="sidebar-injector"></div>
    <script src="js/sidebar.js"></script>
    <script src="js/bottom-nav.js"></script>

    <script>
        // =========================================================================
        // WEEKLY MATRIX ENGINE (TIMELINE VIEW)
        // =========================================================================

        const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let activeDay = getRealCurrentDay();

        function getRealCurrentDay() {
            let d = new Date().getDay();
            if (d === 0) return 'Sunday';
            return daysOfWeek[d - 1];
        }

        // --- MODAL SYSTEM ---
        function openModal() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.add('flex');
            
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let nextH = String((now.getHours() + 1) % 24).padStart(2, '0');
            
            document.getElementById('block-start').value = `${h}:00`;
            document.getElementById('block-end').value = `${nextH}:00`;
            document.getElementById('block-title').focus();
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('modal-overlay').classList.remove('flex');
            document.getElementById('block-title').value = '';
        }

        function getCategoryStyle(cat) {
            switch(cat) {
                case 'Class': return { color: 'text-accentPurple', border: 'border-accentPurple/30', bg: 'bg-accentPurple/10', solidBorder: 'border-accentPurple', solidBg: 'bg-accentPurple' };
                case 'Review': return { color: 'text-accentYellow', border: 'border-accentYellow/30', bg: 'bg-accentYellow/10', solidBorder: 'border-accentYellow', solidBg: 'bg-accentYellow' };
                case 'Life': return { color: 'text-accentGreen', border: 'border-accentGreen/30', bg: 'bg-accentGreen/10', solidBorder: 'border-accentGreen', solidBg: 'bg-accentGreen' };
                case 'Urgent': return { color: 'text-accentRed', border: 'border-accentRed/30', bg: 'bg-accentRed/10', solidBorder: 'border-accentRed', solidBg: 'bg-accentRed' };
                default: return { color: 'text-accentBlue', border: 'border-accentBlue/30', bg: 'bg-accentBlue/10', solidBorder: 'border-accentBlue', solidBg: 'bg-accentBlue' }; // Deep Work
            }
        }

        // --- CORE LOGIC ---
        function renderDayNav() {
            const nav = document.getElementById('day-nav');
            let html = '';
            daysOfWeek.forEach(day => {
                const isActive = day === activeDay ? 'active' : '';
                html += `<button onclick="switchDay('${day}')" class="day-pill touch-btn ${isActive}">${day.substring(0,3)}</button>`;
            });
            nav.innerHTML = html;
            
            const activePill = nav.querySelector('.active');
            if(activePill) {
                nav.scrollTo({ left: activePill.offsetLeft - 20, behavior: 'smooth' });
            }
        }

        function switchDay(day) {
            activeDay = day;
            renderDayNav();
            loadMatrix();
        }

        function parseTime(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function formatTime12h(timeStr) {
            const [h, m] = timeStr.split(':');
            let hours = parseInt(h);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return `${hours}:${m} ${ampm}`;
        }

        function formatTime12hSplit(timeStr) {
            const [h, m] = timeStr.split(':');
            let hours = parseInt(h);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            return { time: `${hours}:${m}`, period: ampm };
        }

        function loadMatrix() {
            const allBlocks = JSON.parse(localStorage.getItem('sys_weekly')) || [];
            const container = document.getElementById('matrix-container');
            
            let dayBlocks = allBlocks.filter(b => b.day === activeDay);
            dayBlocks.sort((a, b) => parseTime(a.start) - parseTime(b.start));

            if (dayBlocks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 mt-10 border border-dashed border-white/10 rounded-2xl bg-black/40">
                        <i class="ph-fill ph-calendar-x text-4xl text-gray-600 mb-2"></i>
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Timeline Clear.</p>
                        <p class="text-[8px] font-bold text-gray-600 uppercase tracking-widest mt-1">Tap + to allocate a time block.</p>
                    </div>`;
                return;
            }

            // The Timeline Layout Container
            let html = '<div class="relative border-l-2 border-white/10 ml-[4.5rem] space-y-6 mt-4">';
            
            dayBlocks.forEach(b => {
                const style = getCategoryStyle(b.category);
                const startSplit = formatTime12hSplit(b.start);

                html += `
                    <div class="relative pl-5">
                        <div class="absolute -left-[10px] top-4 w-[18px] h-[18px] rounded-full bg-[#020202] border-[3px] ${style.solidBorder} flex items-center justify-center z-10 shadow-[0_0_10px_currentColor] ${style.color}">
                        </div>
                        
                        <div class="absolute -left-[5rem] top-3 w-14 text-right pr-2">
                            <p class="text-[14px] font-black ${style.color} leading-none tracking-tighter">${startSplit.time}</p>
                            <p class="text-[9px] font-black text-gray-600 uppercase mt-1">${startSplit.period}</p>
                        </div>

                        <div class="bg-black/40 border border-white/5 p-4 rounded-2xl relative overflow-hidden group shadow-lg">
                            <div class="absolute left-0 top-0 bottom-0 w-1 ${style.solidBg}"></div>
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-sm font-black text-white uppercase tracking-widest">${b.title}</h3>
                                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1 flex items-center gap-1">
                                        <i class="ph-bold ph-clock"></i> ${formatTime12h(b.start)} - ${formatTime12h(b.end)}
                                    </p>
                                </div>
                                <button onclick="deleteBlock(${b.id})" class="text-gray-600 hover:text-accentRed transition p-1 -mt-1 -mr-1 active:scale-90 shrink-0"><i class="ph-bold ph-x text-sm"></i></button>
                            </div>
                            <div class="mt-3">
                                <span class="text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded border ${style.color} ${style.border} ${style.bg}">
                                    ${b.category}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function saveBlock() {
            const title = document.getElementById('block-title').value.trim();
            const start = document.getElementById('block-start').value;
            const end = document.getElementById('block-end').value;
            const cat = document.getElementById('block-category').value;

            if (!title || !start || !end) {
                alert("Protocol Error: Title and Time parameters required.");
                return;
            }

            const allBlocks = JSON.parse(localStorage.getItem('sys_weekly')) || [];
            
            allBlocks.push({
                id: Date.now(),
                day: activeDay,
                title: title,
                start: start,
                end: end,
                category: cat
            });

            localStorage.setItem('sys_weekly', JSON.stringify(allBlocks));
            closeModal();
            loadMatrix();
        }

        function deleteBlock(id) {
            if(confirm("Remove this block from the matrix?")) {
                let allBlocks = JSON.parse(localStorage.getItem('sys_weekly')) || [];
                allBlocks = allBlocks.filter(b => b.id !== id);
                localStorage.setItem('sys_weekly', JSON.stringify(allBlocks));
                loadMatrix();
            }
        }

        // Init
        window.onload = () => {
            renderDayNav();
            loadMatrix();
        };

    </script>
</body>
</html>
