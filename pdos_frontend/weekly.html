<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Weekly Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentYellow: '#FBBF24', accentRed: '#FF4C4C' 
                    }
                }
            }
        }
    </script>
    <style>
        /* MOBILE VIEWPORT LOCKS */
        body, html { background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; margin: 0; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
        .mobile-viewport { width: 100%; max-width: 430px; height: 100dvh; margin: 0 auto; position: relative; background-color: #020202; display: flex; flex-direction: column; overflow: hidden; }

        /* UPGRADED BACKGROUND: Dark Architectural Mesh */
        .weekly-bg { 
            background-image: url('https://images.unsplash.com/photo-1614850715649-1d0106293bd1?auto=format&fit=crop&q=80&w=1000'); 
            background-size: cover; background-position: center; position: absolute; inset: 0; opacity: 0.15; z-index: 1; filter: grayscale(100%) contrast(120%); 
        }
        .vignette { background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.98) 80%, #000 100%); position: absolute; inset: 0; z-index: 2; }
        .content-layer { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* SCROLLABLE AREA */
        main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 1.25rem; }
        main::-webkit-scrollbar { display: none; }

        .glass-panel { background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-dark { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.3s; font-size: 14px; width: 100%; }
        
        /* Time Input Filter for Dark Mode */
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }

        /* Day Selector Bubbles */
        .day-bubble {
            width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; 
            transition: 0.2s; background: rgba(0,0,0,0.4); cursor: pointer; color: #6b7280;
        }
        .day-bubble.selected { background: #3B82F6; color: #fff; border-color: #3B82F6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        
        .day-card { border-left: 2px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .day-card.is-today { border-left-color: #66FCF1; background: rgba(102, 252, 241, 0.05); }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <div class="weekly-bg"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            
            <header class="p-6 pb-2 flex justify-between items-center border-b border-white/5 bg-black/20 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                    <h1 class="text-xl font-black text-white tracking-widest uppercase">Weekly</h1>
                </div>
                <div class="text-[9px] font-black text-accentBlue border border-accentBlue/20 bg-accentBlue/5 px-3 py-1 rounded-full uppercase">Macro-Plan</div>
            </header>

            <main>
                <div class="glass-panel p-5 rounded-[2.5rem] mb-8 border-t-2 border-t-accentBlue space-y-4 shadow-2xl">
                    <div class="flex items-center gap-2 mb-1">
                        <i class="ph-fill ph-calendar-plus text-accentBlue text-lg"></i>
                        <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Batch Deploy Tasks</h3>
                    </div>
                    
                    <div class="flex gap-2">
                        <input type="time" id="routine-time" class="w-1/3 input-dark !text-[11px] font-bold text-gray-300 !px-2 text-center">
                        <input type="text" id="routine-name" placeholder="E.g. Compile Lab Reports..." class="flex-1 input-dark !text-xs font-bold text-white">
                    </div>
                    
                    <div>
                        <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em] mb-2 px-1">Select Execution Days</p>
                        <div class="flex justify-between gap-1" id="day-selector">
                            <div class="day-bubble" onclick="toggleDay('Mon')">M</div>
                            <div class="day-bubble" onclick="toggleDay('Tue')">T</div>
                            <div class="day-bubble" onclick="toggleDay('Wed')">W</div>
                            <div class="day-bubble" onclick="toggleDay('Thu')">T</div>
                            <div class="day-bubble" onclick="toggleDay('Fri')">F</div>
                            <div class="day-bubble" onclick="toggleDay('Sat')">S</div>
                            <div class="day-bubble" onclick="toggleDay('Sun')">S</div>
                        </div>
                    </div>
                    
                    <button onclick="addRoutine()" class="w-full bg-accentBlue/20 text-accentBlue border border-accentBlue/30 font-black py-3.5 rounded-xl uppercase text-[10px] tracking-widest active:scale-95 transition flex justify-center items-center gap-2">
                        <i class="ph-bold ph-push-pin text-lg"></i> Lock to Matrix
                    </button>
                </div>

                <div class="space-y-4 mb-8">
                    <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em] px-2 flex items-center gap-2">
                        <i class="ph-fill ph-calendar-week text-accentTeal"></i> 7-Day Matrix
                    </h3>
                    
                    <div id="weekly-grid" class="space-y-3">
                        </div>
                </div>

                <div class="h-32"></div>
            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>

    <script>
        // --- STATE MANAGEMENT ---
        const DAYS_OF_WEEK = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const FULL_DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let selectedDays = [];
        
        // --- DATA MIGRATION ENGINE ---
        // Converts old grouped data into the new granular Instance-Based data format
        let rawStorage = JSON.parse(localStorage.getItem('sys_weekly_routines')) || [];
        let weeklyTasks = [];
        
        rawStorage.forEach(item => {
            if (item.days) {
                // It's an old format array. Split it into individual instances.
                item.days.forEach((dayStr, idx) => {
                    weeklyTasks.push({
                        id: item.id + idx, // Ensure unique IDs
                        name: item.name,
                        day: dayStr,
                        rawTime: item.rawTime || "24:00",
                        displayTime: item.displayTime || "ANY"
                    });
                });
            } else if (item.day) {
                // It's already the new format
                weeklyTasks.push(item);
            }
        });

        // Save migrated data back to local storage
        localStorage.setItem('sys_weekly_routines', JSON.stringify(weeklyTasks));

        // --- DATE CALCULATIONS ---
        const todayObj = new Date();
        let currentDayIndex = todayObj.getDay() - 1;
        if (currentDayIndex === -1) currentDayIndex = 6; 

        const mondayDateObj = new Date(todayObj);
        mondayDateObj.setDate(todayObj.getDate() - currentDayIndex);

        // --- UI INTERACTION ---
        function toggleDay(dayStr) {
            const index = selectedDays.indexOf(dayStr);
            if (index > -1) {
                selectedDays.splice(index, 1);
            } else {
                selectedDays.push(dayStr);
            }
            updateDaySelectorUI();
        }

        function updateDaySelectorUI() {
            const bubbles = document.querySelectorAll('.day-bubble');
            bubbles.forEach((bubble, idx) => {
                const dayStr = DAYS_OF_WEEK[idx];
                if (selectedDays.includes(dayStr)) {
                    bubble.classList.add('selected');
                } else {
                    bubble.classList.remove('selected');
                }
            });
        }

        function addRoutine() {
            const timeVal = document.getElementById('routine-time').value;
            const name = document.getElementById('routine-name').value.trim();
            
            if (!name || selectedDays.length === 0) {
                alert("Please enter a routine name and select at least one day.");
                return;
            }

            let displayTime = "ANY";
            let rawTime = "24:00"; 
            
            if (timeVal) {
                rawTime = timeVal;
                const [hours, minutes] = timeVal.split(':');
                const parsedHours = parseInt(hours, 10);
                const ampm = parsedHours >= 12 ? 'PM' : 'AM';
                const displayHours = parsedHours % 12 || 12;
                displayTime = `${displayHours}:${minutes} ${ampm}`;
            }

            // INSTANCE GENERATOR: Creates a separate object for every day selected
            const baseId = Date.now();
            selectedDays.forEach((dayStr, index) => {
                weeklyTasks.push({
                    id: baseId + index, // Guarantees unique ID for precise deletion
                    name: name,
                    day: dayStr,
                    rawTime: rawTime,
                    displayTime: displayTime
                });
            });

            // Reset Input
            document.getElementById('routine-time').value = '';
            document.getElementById('routine-name').value = '';
            selectedDays = [];
            updateDaySelectorUI();
            
            sync();
        }

        function deleteRoutine(id) {
            // Because they are granular instances, this only deletes the specific day clicked
            weeklyTasks = weeklyTasks.filter(t => t.id !== id);
            sync();
        }

        // --- RENDER ENGINE ---
        function sync() {
            localStorage.setItem('sys_weekly_routines', JSON.stringify(weeklyTasks));
            renderMatrix();
        }

        function renderMatrix() {
            const grid = document.getElementById('weekly-grid');
            grid.innerHTML = '';

            FULL_DAYS.forEach((fullDay, idx) => {
                const shortDay = DAYS_OF_WEEK[idx];
                const isToday = (idx === currentDayIndex);
                
                const thisDateObj = new Date(mondayDateObj);
                thisDateObj.setDate(mondayDateObj.getDate() + idx);
                const dateString = thisDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                // Filter specifically for this day's instances and sort by time
                const todaysRoutines = weeklyTasks
                    .filter(t => t.day === shortDay)
                    .sort((a, b) => a.rawTime.localeCompare(b.rawTime));
                
                let routinesHTML = '';
                if (todaysRoutines.length > 0) {
                    todaysRoutines.forEach(task => {
                        const timeBadge = task.displayTime !== "ANY" 
                            ? `<span class="text-[9px] font-black text-accentBlue w-14 shrink-0 mt-0.5">${task.displayTime}</span>`
                            : `<span class="text-[9px] font-black text-gray-600 w-14 shrink-0 mt-0.5">ANY</span>`;

                        routinesHTML += `
                            <div class="flex justify-between items-start bg-black/40 border border-white/5 p-3 rounded-xl mb-1.5 gap-2">
                                ${timeBadge}
                                <span class="text-xs font-bold text-gray-200 flex-1 leading-tight">${task.name}</span>
                                <i class="ph ph-trash text-gray-600 hover:text-red-500 active:text-red-500 transition cursor-pointer text-sm" onclick="deleteRoutine(${task.id})"></i>
                            </div>
                        `;
                    });
                } else {
                    routinesHTML = `<p class="text-[9px] text-gray-600 italic uppercase tracking-widest pl-1 py-1">No Protocols Scheduled</p>`;
                }

                const todayBadge = isToday ? `<span class="bg-accentTeal text-black px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-widest ml-2 shadow-[0_0_10px_rgba(102,252,241,0.5)]">Today</span>` : '';
                const cardClass = isToday ? 'day-card is-today' : 'day-card opacity-90';

                grid.innerHTML += `
                    <div class="glass-panel p-4 rounded-2xl ${cardClass}">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center">
                                <h4 class="text-[11px] font-black ${isToday ? 'text-accentTeal' : 'text-white'} uppercase tracking-[0.2em]">${fullDay}</h4>
                                ${todayBadge}
                            </div>
                            <span class="text-[9px] font-bold text-gray-500 tracking-widest uppercase">${dateString}</span>
                        </div>
                        <div class="space-y-1">
                            ${routinesHTML}
                        </div>
                    </div>
                `;
            });
        }

        // Init
        window.onload = renderMatrix;
    </script>
</body>
</html>
