<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Deep Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', accentPurple: '#A855F7', accentYellow: '#FBBF24' }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000;
            color: #C5C6C7;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            margin: 0;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .mobile-viewport {
            width: 100%;
            max-width: 430px;
            height: 100%;
            position: relative;
            background-color: #020202;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .focus-bg {
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            position: absolute;
            inset: 0;
            opacity: 0.1;
            z-index: 1;
            filter: grayscale(100%);
        }

        .vignette {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.98) 70%, #000 100%);
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 2rem;
        }

        .glass-panel {
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* TACTICAL PROGRESS RAIL */
        .tactical-rail {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rail-fill {
            height: 100%;
            background: linear-gradient(90deg, #FBBF24 0%, #F59E0B 100%);
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        .rail-segments {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(90deg, transparent 95%, rgba(0, 0, 0, 0.4) 95%);
            background-size: 10% 100%;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #FBBF24;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div class="mobile-viewport">
        <div class="focus-bg"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            <div id="sidebar-injector"></div>

            <header
                class="p-6 pb-2 flex justify-between items-center border-b border-white/5 bg-black/30 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <i id="menu-btn"
                        class="ph ph-list text-2xl text-white cursor-pointer active:text-accentYellow transition"></i>
                    <h1 class="text-xl font-bold text-white tracking-widest uppercase">Focus</h1>
                </div>
                <div
                    class="text-[10px] font-black text-accentYellow border border-accentYellow/20 bg-accentYellow/5 px-3 py-1 rounded-full uppercase">
                    <span id="live-time">00:00</span>
                </div>
            </header>

            <main class="p-5 space-y-6">

                <div class="glass-panel p-6 rounded-[2.5rem] space-y-4 border-t-2 border-t-accentYellow">
                    <div class="flex justify-between items-end">
                        <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Daily Load</p>
                        <h2 class="text-xl font-black text-white"><span id="daily-hours">0</span>h <span
                                id="daily-mins">0</span>m</h2>
                    </div>
                    <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                        <div id="daily-progress-bar" class="bg-accentYellow h-full transition-all duration-500"
                            style="width: 0%"></div>
                    </div>
                </div>

                <div class="glass-panel p-8 rounded-[2.5rem] relative overflow-hidden">
                    <div
                        class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1456735190827-d1262f71b8a3?auto=format&fit=crop&q=80&w=800')] bg-cover bg-center opacity-20 filter grayscale z-0">
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/60 to-black/90 z-0"></div>

                    <div class="relative z-10 flex flex-col items-center space-y-8">
                        <div class="w-full text-center space-y-4">
                            <h1 id="timer-display"
                                class="text-7xl font-black text-white tracking-tighter drop-shadow-2xl">25:00</h1>

                            <div class="tactical-rail w-full max-w-[280px] mx-auto">
                                <div id="timer-rail-fill" class="rail-fill" style="width: 100%"></div>
                                <div class="rail-segments"></div>
                            </div>
                        </div>

                        <div class="w-full space-y-2 bg-black/40 p-4 rounded-2xl border border-white/5">
                            <div
                                class="flex justify-between text-[8px] font-black text-gray-400 uppercase tracking-widest">
                                <span>5m</span><span>Target</span><span>120m</span>
                            </div>
                            <input type="range" id="duration-slider" min="5" max="120" step="5" value="25"
                                oninput="updateTimerSettings()">
                            <p class="text-center text-xs font-black text-accentYellow mt-2 uppercase tracking-widest">
                                <span id="slider-val">25</span> Minutes
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-3 w-full">
                            <button onclick="resetTimer()"
                                class="bg-white/5 border border-white/10 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest active:scale-95 transition">Reset</button>
                            <button id="btn-play" onclick="toggleTimer()"
                                class="bg-accentYellow text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest active:scale-95 transition col-span-2 shadow-[0_0_20px_rgba(251,191,36,0.3)]">Initiate
                                Focus</button>
                        </div>
                    </div>
                </div>

                <div id="session-list" class="space-y-3 pb-8"></div>
            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000);
        updateClock();

        let baseDuration = 25;
        let timeLeft = baseDuration * 60;
        let timerInterval = null;
        let isRunning = false;
        let targetEndTime = 0;

        const display = document.getElementById('timer-display');
        const rail = document.getElementById('timer-rail-fill');
        const btnPlay = document.getElementById('btn-play');
        const slider = document.getElementById('duration-slider');

        function updateTimerSettings() {
            if (isRunning) return;
            baseDuration = parseInt(slider.value);
            document.getElementById('slider-val').innerText = baseDuration;
            timeLeft = baseDuration * 60;
            updateDisplay();
        }

        function updateDisplay() {
            if (timeLeft < 0) timeLeft = 0;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;

            // Update Rail Width
            const progress = (timeLeft / (baseDuration * 60)) * 100;
            rail.style.width = `${progress}%`;
        }

        window.toggleTimer = function () {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                btnPlay.innerText = "Resume Focus";
                btnPlay.classList.replace('bg-accentRed', 'bg-accentYellow');
            } else {
                targetEndTime = Date.now() + (timeLeft * 1000);
                timerInterval = setInterval(tick, 250);
                isRunning = true;
                btnPlay.innerText = "Pause Sync";
            }
        }

        function tick() {
            const now = Date.now();
            timeLeft = Math.round((targetEndTime - now) / 1000);
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(timerInterval);
                isRunning = false;
                updateDisplay();
                logSession();
                resetTimer();
            } else {
                updateDisplay();
            }
        }

        window.resetTimer = function () {
            clearInterval(timerInterval);
            isRunning = false;
            baseDuration = parseInt(slider.value);
            timeLeft = baseDuration * 60;
            updateDisplay();
            btnPlay.innerText = "Initiate Focus";
        }

        function logSession() {
            const logs = JSON.parse(localStorage.getItem('sys_focus_logs')) || [];
            logs.push({ date: new Date().toISOString().split('T')[0], duration: baseDuration, id: Date.now() });
            localStorage.setItem('sys_focus_logs', JSON.stringify(logs));
            renderLedger();
        }

        function renderLedger() {
            const logs = JSON.parse(localStorage.getItem('sys_focus_logs')) || [];
            const today = new Date().toISOString().split('T')[0];
            const todaysLogs = logs.filter(l => l.date === today);
            const total = todaysLogs.reduce((s, l) => s + l.duration, 0);
            document.getElementById('daily-hours').innerText = Math.floor(total / 60);
            document.getElementById('daily-mins').innerText = total % 60;
            document.getElementById('daily-progress-bar').style.width = `${Math.min((total / 240) * 100, 100)}%`;
        }

        window.onload = () => { renderLedger(); updateDisplay(); };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('System OS Service Worker registered!', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
