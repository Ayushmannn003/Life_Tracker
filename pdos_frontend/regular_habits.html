<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System OS | Daily Routines</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24',
                        accentGreen: '#00E676', cardBg: '#080A0E' 
                    }
                }
            }
        }
    </script>
    <style>
        /* STRICT MOBILE LOCK */
        body, html { 
            background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        .mobile-viewport { 
            width: 100%; max-width: 430px; margin: 0 auto; position: relative; 
            background-color: #020202; height: 100%; display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        /* Added extra padding-bottom to ensure multiple habits scroll perfectly past the nav bar */
        main { padding: 1.25rem; flex: 1; overflow-y: auto; padding-bottom: 9rem; display: flex; flex-direction: column; gap: 1.5rem; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .touch-btn { transition: transform 0.1s; cursor: pointer; }
        .touch-btn:active { transform: scale(0.96); }

        /* DEEP GLASS CARDS */
        .sys-card { 
            background: linear-gradient(145deg, #0A0C12 0%, #050608 100%); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem;
            padding: 1.25rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .border-teal { border-top: 2px solid #66FCF1; }

        /* INPUTS */
        .sys-input {
            background: #000; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem; padding: 1rem; color: #fff; font-size: 13px; font-weight: 600;
            outline: none; transition: border-color 0.2s;
        }
        .sys-input:focus { border-color: #66FCF1; }

        /* INTERACTIVE MONTHLY MATRIX BLOCKS */
        .matrix-block { 
            width: 100%; aspect-ratio: 1; border-radius: 0.4rem; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; transition: all 0.2s ease; 
            cursor: pointer; user-select: none;
        }
        .matrix-block:active { transform: scale(0.85); }
        .block-done { background-color: #00E676; color: #000; box-shadow: 0 0 10px rgba(0,230,118,0.5); }
        .block-miss { background-color: rgba(255,255,255,0.03); color: #4B5563; border: 1px solid rgba(255,255,255,0.05); }
        .block-future { background-color: transparent; color: #4B5563; border: 1px dashed rgba(255,255,255,0.1); opacity: 0.5; }
        .block-today-pending { background-color: rgba(102,252,241,0.05); color: #66FCF1; border: 1px dashed #66FCF1; }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <header class="p-6 pb-2 flex justify-between items-center z-50 bg-[#020202]/90 backdrop-blur-xl shrink-0">
            <div class="flex items-center gap-4">
                <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                <h1 class="text-xl font-black text-white tracking-widest uppercase">Daily Routines</h1>
            </div>
            <div class="text-[10px] font-black text-accentTeal bg-accentTeal/10 border border-accentTeal/20 px-3 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-accentTeal animate-pulse shadow-[0_0_5px_#66FCF1]"></div> 30-DAY MATRIX
            </div>
        </header>

        <main>
            <div class="sys-card border-teal relative shrink-0">
                <div class="flex items-center gap-2 mb-3">
                    <i class="ph-fill ph-infinity text-accentTeal text-lg drop-shadow-[0_0_5px_rgba(102,252,241,0.5)]"></i>
                    <h2 class="text-[11px] font-black text-white uppercase tracking-widest">Add Baseline Routine</h2>
                </div>
                <form onsubmit="addRoutine(event)" class="flex flex-col gap-2 relative z-10">
                    <div class="flex gap-2">
                        <select id="routine-category" class="sys-input py-3 w-1/3 text-[10px] uppercase tracking-widest">
                            <option value="Academics">📚 Acad</option>
                            <option value="Coding">💻 Code</option>
                            <option value="Health">⚡ Health</option>
                            <option value="Life">🧘 Life</option>
                        </select>
                        <input type="text" id="routine-input" class="sys-input py-3 w-2/3" placeholder="e.g. Read 20 Pages" autocomplete="off" required>
                    </div>
                    <button type="submit" class="bg-accentTeal text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest touch-btn shadow-[0_0_15px_rgba(102,252,241,0.3)]">
                        Initialize 30-Day Matrix
                    </button>
                </form>
            </div>

            <div id="routines-container" class="flex flex-col gap-5 w-full">
                </div>

        </main>
    </div>

    <div id="sidebar-injector"></div>
    <script src="js/sidebar.js"></script>
    <script src="js/bottom-nav.js"></script>

    <script>
        // =========================================================================
        // MONTHLY ROUTINE ENGINE (MANUAL 30-DAY MATRIX)
        // =========================================================================

        function getLocalYMD(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function formatDisplayDate(dateStr) {
            if(!dateStr) return "Unknown";
            const parts = dateStr.split('-');
            const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            return dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function getCategoryColor(cat) {
            switch(cat) {
                case 'Academics': return 'text-accentPurple bg-accentPurple/10 border-accentPurple/20';
                case 'Coding': return 'text-accentBlue bg-accentBlue/10 border-accentBlue/20';
                case 'Health': return 'text-accentRed bg-accentRed/10 border-accentRed/20';
                default: return 'text-gray-300 bg-white/5 border-white/10';
            }
        }

        const todayStr = getLocalYMD(new Date());

        function loadRoutines() {
            const routines = JSON.parse(localStorage.getItem('sys_routines')) || [];
            const container = document.getElementById('routines-container');
            
            if (routines.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 border border-dashed border-white/10 rounded-2xl bg-black/40">
                        <i class="ph-fill ph-infinity text-4xl text-gray-600 mb-2"></i>
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">No Baseline Routines.</p>
                        <p class="text-[8px] font-bold text-gray-600 uppercase tracking-widest mt-1">Initialize a 30-Day Matrix Above.</p>
                    </div>`;
                return;
            }

            let html = '';

            routines.forEach(routine => {
                const history = routine.history || [];
                const catClass = getCategoryColor(routine.category);
                
                // Safety catch for older routines that didn't have an endDate
                if (!routine.endDate) {
                    const startObj = new Date(routine.startDate.split('-')[0], routine.startDate.split('-')[1]-1, routine.startDate.split('-')[2]);
                    const endObj = new Date(startObj);
                    endObj.setDate(endObj.getDate() + 29); // 30 days total
                    routine.endDate = getLocalYMD(endObj);
                }

                const [sy, sm, sd] = routine.startDate.split('-');
                let iterDate = new Date(sy, sm - 1, sd);
                const todayObj = new Date(todayStr.split('-')[0], todayStr.split('-')[1]-1, todayStr.split('-')[2]);
                const endObj = new Date(routine.endDate.split('-')[0], routine.endDate.split('-')[1]-1, routine.endDate.split('-')[2]);

                let matrixHtml = '';
                let totalDone = 0;
                
                // Construct exactly 30 clickable blocks (6 columns x 5 rows)
                for (let i = 0; i < 30; i++) {
                    const currentIterStr = getLocalYMD(iterDate);
                    const iterObj = new Date(iterDate);
                    const dayNum = iterDate.getDate();

                    const isDone = history.includes(currentIterStr);
                    const isToday = currentIterStr === todayStr;
                    const isFuture = iterObj > todayObj;

                    if (isDone) totalDone++;

                    let blockClass = '';
                    if (isDone) {
                        blockClass = 'block-done';
                    } else if (isFuture) {
                        blockClass = 'block-future';
                    } else if (isToday && !isDone) {
                        blockClass = 'block-today-pending';
                    } else {
                        blockClass = 'block-miss';
                    }

                    // MANUAL CLICK INJECTION
                    matrixHtml += `<div class="matrix-block ${blockClass}" onclick="toggleSpecificDate(${routine.id}, '${currentIterStr}')">${dayNum}</div>`;
                    
                    iterDate.setDate(iterDate.getDate() + 1); // Advance loop by 1 day
                }

                const isMonthOver = todayObj > endObj;
                const yieldPct = Math.round((totalDone / 30) * 100);
                
                let statusBadge = isMonthOver 
                    ? `<span class="text-[9px] font-black text-gray-500 uppercase tracking-widest px-2 py-1 border border-white/10 rounded bg-black/50">Month Concluded</span>`
                    : `<span class="text-[9px] font-black text-accentTeal uppercase tracking-widest px-2 py-1 border border-accentTeal/20 rounded bg-accentTeal/10">Active Tracking</span>`;

                html += `
                    <div class="sys-card bg-[#080A0E] border border-white/10 p-5 rounded-[1.5rem] w-full shrink-0 shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-[85%]">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${catClass}">${routine.category || 'Life'}</span>
                                </div>
                                <h3 class="text-sm font-black text-white uppercase tracking-widest break-words pr-2">${routine.name}</h3>
                                <div class="flex items-center gap-2 mt-2 opacity-80">
                                    <i class="ph-fill ph-calendar text-gray-400 text-xs"></i>
                                    <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">
                                        START: ${formatDisplayDate(routine.startDate)} &nbsp;|&nbsp; END: ${formatDisplayDate(routine.endDate)}
                                    </p>
                                </div>
                            </div>
                            <button onclick="deleteRoutine(${routine.id})" class="text-gray-600 hover:text-accentRed transition active:scale-90 p-2 -mr-2 -mt-2">
                                <i class="ph-fill ph-trash text-lg"></i>
                            </button>
                        </div>
                        
                        <div class="flex justify-between items-end mb-4 border-t border-white/5 pt-4 mt-2">
                            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Yield: <span class="text-white">${totalDone}/30 (${yieldPct}%)</span></p>
                            ${statusBadge}
                        </div>

                        <p class="text-[8px] font-bold text-gray-600 uppercase tracking-widest mb-3 text-center">Tap any block to toggle completion</p>

                        <div class="grid grid-cols-6 gap-2 p-3 bg-black/60 rounded-xl border border-white/5 w-full">
                            ${matrixHtml}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // --- ADD NEW 30-DAY ROUTINE ---
        function addRoutine(e) {
            e.preventDefault();
            const input = document.getElementById('routine-input');
            const catInput = document.getElementById('routine-category');
            const name = input.value.trim();
            if (!name) return;

            const routines = JSON.parse(localStorage.getItem('sys_routines')) || [];
            
            const startObj = new Date();
            const startDateStr = getLocalYMD(startObj);
            
            const endObj = new Date();
            endObj.setDate(endObj.getDate() + 29); // +29 days = 30 days total
            const endDateStr = getLocalYMD(endObj);

            const newRoutine = {
                id: Date.now(),
                name: name,
                category: catInput.value,
                startDate: startDateStr,
                endDate: endDateStr,
                history: []
            };

            // Add new routine to the beginning of the array so it shows up at the top
            routines.unshift(newRoutine);
            localStorage.setItem('sys_routines', JSON.stringify(routines));
            
            input.value = '';
            input.blur();
            loadRoutines();
            
            // Ping Analyzer Hub to Sync Changes
            window.dispatchEvent(new Event('storage'));
        }

        // --- MANUALLY TOGGLE ANY SPECIFIC DATE IN THE MATRIX ---
        function toggleSpecificDate(id, targetDateStr) {
            let routines = JSON.parse(localStorage.getItem('sys_routines')) || [];
            const routineIndex = routines.findIndex(r => r.id === id);
            
            if (routineIndex > -1) {
                let history = routines[routineIndex].history || [];
                const dateIndex = history.indexOf(targetDateStr);
                
                if (dateIndex > -1) {
                    history.splice(dateIndex, 1); // Uncheck if already checked
                } else {
                    history.push(targetDateStr); // Check if empty
                }
                
                routines[routineIndex].history = history;
                localStorage.setItem('sys_routines', JSON.stringify(routines));
                loadRoutines(); // Instantly re-render the UI
                
                // Ping Analyzer Hub to update its global progress bar
                window.dispatchEvent(new Event('storage'));
            }
        }

        // --- DELETE ROUTINE ---
        function deleteRoutine(id) {
            if(confirm("Terminate this 30-Day Matrix? History will be erased.")) {
                let routines = JSON.parse(localStorage.getItem('sys_routines')) || [];
                routines = routines.filter(r => r.id !== id);
                localStorage.setItem('sys_routines', JSON.stringify(routines));
                loadRoutines();
                window.dispatchEvent(new Event('storage'));
            }
        }

        window.onload = loadRoutines;
        window.addEventListener('storage', loadRoutines);

    </script>
</body>
</html>
