<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Regular Habits</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6' }
                }
            }
        }
    </script>
    <style>
        /* UNIVERSAL MOBILE SCROLL LOCK */
        body,
        html {
            background-color: #000;
            color: #C5C6C7;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .mobile-viewport {
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            background-color: #020202;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bg-layer {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            position: absolute;
            inset: 0;
            opacity: 0.15;
            z-index: 1;
            filter: grayscale(100%);
        }

        .vignette {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.98) 80%, #000 100%);
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 1.25rem;
        }

        main::-webkit-scrollbar {
            display: none;
        }

        .glass-panel {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-dark {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        /* Mini Calendar Grid Day */
        .cal-day {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: 900;
            transition: 0.1s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .cal-day.inactive {
            background: rgba(255, 255, 255, 0.03);
            color: #555;
        }

        .cal-day.active {
            background: #3B82F6;
            color: #fff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            border-color: #3B82F6;
        }

        .cal-day.future {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Cant check future days */
    </style>
</head>

<body>

    <div class="mobile-viewport">
        <div class="bg-layer"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            <div id="sidebar-injector"></div>

            <header
                class="p-6 pb-2 flex justify-between items-center border-b border-white/5 bg-black/20 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <i id="menu-btn"
                        class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                    <h1 class="text-xl font-black text-white tracking-widest uppercase">Routines</h1>
                </div>
                <div
                    class="text-[9px] font-black text-accentBlue border border-accentBlue/20 bg-accentBlue/5 px-3 py-1 rounded-full uppercase">
                    Monthly Sync</div>
            </header>

            <main>
                <div class="glass-panel p-5 rounded-[2rem] mb-6 border-t-2 border-t-accentBlue">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em]" id="report-month">Month
                            Report</h3>
                        <i class="ph-fill ph-chart-polar text-accentBlue text-xl"></i>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center divide-x divide-white/10">
                        <div>
                            <p id="stat-habits" class="text-lg font-black text-white">0</p>
                            <p class="text-[7px] font-bold text-gray-500 uppercase tracking-widest">Tracking</p>
                        </div>
                        <div>
                            <p id="stat-checks" class="text-lg font-black text-white">0</p>
                            <p class="text-[7px] font-bold text-gray-500 uppercase tracking-widest">Check-Ins</p>
                        </div>
                        <div>
                            <p id="stat-rate" class="text-lg font-black text-accentBlue">0%</p>
                            <p class="text-[7px] font-bold text-gray-500 uppercase tracking-widest">Hit Rate</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2 mb-8">
                    <input type="text" id="habit-input" placeholder="New Monthly Habit..." class="flex-1 input-dark">
                    <button onclick="addHabit()"
                        class="bg-accentBlue text-black font-black px-4 rounded-xl active:scale-95 transition">
                        <i class="ph-bold ph-plus text-lg"></i>
                    </button>
                </div>

                <div id="habit-list" class="space-y-6">
                </div>

                <div class="h-32"></div>
            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        // --- BACKEND LOGIC / DATA ENGINE ---
        // Data Structure: { id, name, logs: { "YYYY-M-D": true/false } }
        let regularHabits = JSON.parse(localStorage.getItem('sys_reg_habits')) || [];

        const dateObj = new Date();
        const currentYear = dateObj.getFullYear();
        const currentMonth = dateObj.getMonth(); // 0-11
        const currentDay = dateObj.getDate();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        // Setup Header Date
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('report-month').innerText = `${monthNames[currentMonth]} Report`;

        function addHabit() {
            const input = document.getElementById('habit-input');
            const name = input.value.trim();
            if (!name) return;

            regularHabits.push({ id: Date.now(), name: name, logs: {} });
            input.value = '';
            sync();
        }

        function editHabitName(id) {
            const habit = regularHabits.find(h => h.id === id);
            if (!habit) return;
            const newName = prompt("Edit Habit Name:", habit.name);
            if (newName && newName.trim() !== "") {
                habit.name = newName.trim();
                sync();
            }
        }

        function deleteHabit(id) {
            if (confirm("Delete this habit permanently?")) {
                regularHabits = regularHabits.filter(h => h.id !== id);
                sync();
            }
        }

        function toggleDay(habitId, day) {
            const habit = regularHabits.find(h => h.id === habitId);
            const dateKey = `${currentYear}-${currentMonth}-${day}`; // Unique key per day

            // Toggle the boolean
            if (habit.logs[dateKey]) {
                delete habit.logs[dateKey];
            } else {
                habit.logs[dateKey] = true;
            }
            sync();
        }

        function sync() {
            localStorage.setItem('sys_reg_habits', JSON.stringify(regularHabits));
            render();
        }

        function render() {
            const container = document.getElementById('habit-list');
            container.innerHTML = '';

            let totalPossibleChecks = regularHabits.length * currentDay; // Possible up to *today*
            let totalActualChecks = 0;

            regularHabits.forEach(habit => {
                const card = document.createElement('div');
                card.className = "glass-panel p-5 rounded-[2rem] space-y-4";

                // Calculate local stats
                let monthChecks = 0;
                let gridHTML = `<div class="grid grid-cols-7 gap-1.5 mt-2">`;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateKey = `${currentYear}-${currentMonth}-${d}`;
                    const isChecked = habit.logs[dateKey] ? true : false;
                    const isFuture = d > currentDay;

                    if (isChecked && !isFuture) {
                        monthChecks++;
                        totalActualChecks++;
                    }

                    let statusClass = isChecked ? 'active' : 'inactive';
                    if (isFuture) statusClass = 'inactive future'; // Gray out future days

                    gridHTML += `<div onclick="toggleDay(${habit.id}, ${d})" class="cal-day ${statusClass}">${d}</div>`;
                }
                gridHTML += `</div>`;

                // Render Card
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-sm font-black text-white uppercase tracking-wider flex items-center gap-2">
                                ${habit.name} 
                                <i onclick="editHabitName(${habit.id})" class="ph-fill ph-pencil-simple text-gray-500 text-xs cursor-pointer active:text-white"></i>
                            </h4>
                            <p class="text-[8px] font-bold text-accentBlue uppercase tracking-widest mt-1">${monthChecks} / ${daysInMonth} Days Logged</p>
                        </div>
                        <button onclick="deleteHabit(${habit.id})" class="text-gray-600 active:text-red-500 transition p-1">
                            <i class="ph ph-trash text-lg"></i>
                        </button>
                    </div>
                    ${gridHTML}
                `;
                container.appendChild(card);
            });

            // Update Report Dashboard
            const hitRate = totalPossibleChecks > 0 ? Math.round((totalActualChecks / totalPossibleChecks) * 100) : 0;
            document.getElementById('stat-habits').innerText = regularHabits.length;
            document.getElementById('stat-checks').innerText = totalActualChecks;
            document.getElementById('stat-rate').innerText = `${hitRate}%`;

            if (regularHabits.length === 0) {
                container.innerHTML = `<p class="text-[10px] text-gray-600 italic text-center py-10 uppercase tracking-widest">No Monthly Routines Set</p>`;
            }
        }

        window.onload = render;
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('System OS Service Worker registered!', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
