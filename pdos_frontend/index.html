<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', 
                        accentTeal: '#66FCF1', 
                        accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', 
                        accentRed: '#FF4C4C', 
                        accentYellow: '#FBBF24' 
                    }
                }
            }
        }
    </script>
    <style>
        /* UNIVERSAL MOBILE SCROLL FIX */
        body, html { 
            background-color: #000; 
            color: #C5C6C7; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%;
        }

        .mobile-viewport { 
            width: 100%; 
            max-width: 430px; 
            height: 100dvh; 
            margin: 0 auto;
            position: relative; 
            background-color: #020202; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* MAIN CONTENT AREA */
        main { 
            flex: 1; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
            padding: 1.25rem;
        }
        main::-webkit-scrollbar { display: none; }
        main { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card System */
        .module-card { 
            position: relative; 
            display: block; 
            border-radius: 1.75rem; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.1s ease-in-out;
            background: #0a0a0a;
        }
        .module-card:active { transform: scale(0.96); }
        .module-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.3; filter: grayscale(100%); }
        
        .vignette-side { background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 100%); }
        .vignette-bottom { background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.95) 100%); }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <header class="p-6 pb-2 flex justify-between items-center z-50 bg-black/50 backdrop-blur-xl border-b border-white/5">
            <div class="flex items-center gap-4">
                <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                <h1 class="text-xl font-black text-white tracking-widest uppercase">System OS</h1>
            </div>
            <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest" id="live-clock">00:00</div>
        </header>

        <main>
            <div class="grid grid-cols-2 gap-4">
                
                <a href="calendar.html" class="module-card h-40 border-t-2 border-t-white">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-bottom"></div>
                    <div class="relative h-full p-4 flex flex-col justify-between">
                        <i class="ph-fill ph-calendar-blank text-white text-3xl opacity-80"></i>
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-widest">Schedule</h2>
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Timeline</p>
                        </div>
                    </div>
                </a>

                <a href="focus.html" class="module-card h-40 border-t-2 border-t-accentYellow">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-bottom"></div>
                    <div class="relative h-full p-4 flex flex-col justify-between">
                        <i class="ph-fill ph-target text-accentYellow text-3xl opacity-80"></i>
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-widest">Focus</h2>
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Timebox</p>
                        </div>
                    </div>
                </a>

                <a href="habits.html" class="module-card h-40 border-t-2 border-t-accentTeal">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-bottom"></div>
                    <div class="relative h-full p-4 flex flex-col justify-between">
                        <i class="ph-fill ph-check-square-offset text-accentTeal text-3xl opacity-80"></i>
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-widest">Habits</h2>
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Weekly Forge</p>
                        </div>
                    </div>
                </a>

                <a href="library.html" class="module-card h-40 border-t-2 border-t-accentBlue">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-bottom"></div>
                    <div class="relative h-full p-4 flex flex-col justify-between">
                        <i class="ph-fill ph-books text-accentBlue text-3xl opacity-80"></i>
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-widest">Library</h2>
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Backlog</p>
                        </div>
                    </div>
                </a>

                <a href="regular_habits.html" class="module-card h-32 col-span-2 border-l-2 border-l-accentBlue">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?auto=format&fit=crop&q=80&w=800'); opacity: 0.2;"></div>
                    <div class="absolute inset-0 vignette-side"></div>
                    <div class="relative h-full p-6 flex flex-col justify-center">
                        <i class="ph-fill ph-calendar-check text-accentBlue text-3xl mb-1 opacity-80"></i>
                        <h2 class="text-xl font-black text-white uppercase tracking-widest">Daily Routines</h2>
                        <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Monthly Tracker</p>
                    </div>
                </a>

                <a href="budget.html" class="module-card h-32 col-span-2 border-l-2 border-l-accentRed">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-side"></div>
                    <div class="relative h-full p-6 flex flex-col justify-center">
                        <i class="ph-fill ph-wallet text-accentRed text-3xl mb-1 opacity-80"></i>
                        <h2 class="text-xl font-black text-white uppercase tracking-widest">Finance</h2>
                        <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Capital Control</p>
                    </div>
                </a>

                <a href="health.html" class="module-card h-40 border-t-2 border-t-accentPurple">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1530497610245-94d3c16cda28?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-bottom"></div>
                    <div class="relative h-full p-4 flex flex-col justify-between">
                        <i class="ph-fill ph-heartbeat text-accentPurple text-3xl opacity-80"></i>
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-widest">Health</h2>
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Bio-Metrics</p>
                        </div>
                    </div>
                </a>

                <a href="analyzer.html" class="module-card h-40 border-t-2 border-t-white/30">
                    <div class="module-bg" style="background-image: url('https://images.unsplash.com/photo-1543286386-713bdd548da4?auto=format&fit=crop&q=80&w=800');"></div>
                    <div class="absolute inset-0 vignette-bottom"></div>
                    <div class="relative h-full p-4 flex flex-col justify-between">
                        <i class="ph-fill ph-chart-line-up text-white/70 text-3xl opacity-80"></i>
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-widest">Analytics</h2>
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">Overview</p>
                        </div>
                    </div>
                </a>

                <div class="col-span-2 h-32"></div>
            </div>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
