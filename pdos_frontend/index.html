<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentRed: '#FF4C4C', accentYellow: '#FBBF24',
                        accentGreen: '#00E676', cardBg: '#080A0E'

    <style>
        /* STRICT MOBILE LOCK */
        body, html { 
            background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        .mobile-viewport { 
            width: 100%; max-width: 430px; margin: 0 auto; position: relative; 
            background-color: #020202; height: 100%; display: flex; 
            flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        main { padding: 1.25rem; flex: 1; overflow-y: auto; padding-bottom: 7rem; display: flex; flex-direction: column; gap: 0.75rem; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* IMAGE CARDS WITH DEEP GLASS */
        .img-card {
            background-color: #080A0E; border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem;
            position: relative; overflow: hidden; cursor: pointer;
            transition: transform 0.15s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .img-card:active { transform: scale(0.97); }

        .bg-layer {
            position: absolute; inset: 0; z-index: 0; background-size: cover; 
            background-position: center; opacity: 0.35; mix-blend-mode: luminosity;
            filter: grayscale(80%) contrast(1.2); transition: opacity 0.3s;
        }
        .img-card:hover .bg-layer { opacity: 0.45; }
        
        .gradient-mask-full { position: absolute; inset: 0; z-index: 1; background: linear-gradient(to right, #080A0E 30%, rgba(8,10,14,0.1) 100%); }
        .gradient-mask-grid { position: absolute; inset: 0; z-index: 1; background: linear-gradient(to bottom, #080A0E 20%, rgba(8,10,14,0.4) 100%); }
        .gradient-mask-fade { position: absolute; inset: 0; z-index: 1; background: linear-gradient(to top, #080A0E 10%, rgba(8,10,14,0.7) 100%); }

        .content-layer { position: relative; z-index: 10; padding: 1.25rem; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

        /* ACCENT BORDERS */
        .accent-yellow { border-top: 2px solid #FBBF24; border-left: 2px solid #FBBF24; }
        .accent-teal { border-top: 2px solid #66FCF1; border-left: 2px solid #66FCF1; }
        .accent-blue { border-top: 2px solid #3B82F6; border-left: 2px solid #3B82F6; }
        .accent-purple { border-top: 2px solid #A855F7; border-left: 2px solid #A855F7; }
        .accent-red { border-top: 2px solid #FF4C4C; border-left: 2px solid #FF4C4C; }
        .accent-white { border-top: 2px solid #FFFFFF; border-left: 2px solid #FFFFFF; }
        .accent-green { border-top: 2px solid #00E676; border-left: 2px solid #00E676; }

        .section-divider { text-align: center; padding: 0.75rem 0 0.25rem 0; opacity: 0.6; }
        .section-divider span { font-size: 9px; font-weight: 900; color: #4B5563; text-transform: uppercase; letter-spacing: 0.3em; }

        /* INLINE LISTS (For Tasks/Rituals on Dashboard) */
        .inline-list-container { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .inline-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 0.5rem 0.75rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.05); 
        }
    </style>
</head>

    <script>
        // STRICT DATE FORMATTER
        function getLocalYMD(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            document.getElementById('sys-clock').innerText = `${h}:${m} ${ampm}`;
            return now.getHours(); 
        }

        function getTagColor(tag) {
            switch(tag) {
                case 'Academic': return 'text-accentPurple';
                case 'Project': return 'text-accentBlue';
                case 'Life': return 'text-accentGreen';
                default: return 'text-accentTeal';
            }
        }

        // --- MASTER SYNC ENGINE ---
        function syncDashboard() {
            try {
                const todayStr = getLocalYMD(new Date());

                // 1. Fetch Latest Data
                const rawTodos = localStorage.getItem('sys_todos');
                const rawRituals = localStorage.getItem('sys_rituals');
                const rawExpenses = localStorage.getItem('sys_expenses');
                const customQuote = localStorage.getItem('sys_quote');
                
                const todos = rawTodos ? JSON.parse(rawTodos) : [];
                const rituals = rawRituals ? JSON.parse(rawRituals) : [];
                const expenses = rawExpenses ? JSON.parse(rawExpenses) : [];

                // 2. Intention & Budget Sync
                document.getElementById('daily-intention').innerText = customQuote || "Protocol active. Execute without friction.";
                
                const spentToday = expenses.filter(e => e.date === todayStr).reduce((s, e) => s + parseFloat(e.amount), 0);
                document.getElementById('dash-budget-val').innerText = `₹${spentToday.toLocaleString()}`;

                // 3. Rituals Sync (AM/PM Aware with Inline Display)
                const currentHour = new Date().getHours();
                const isAM = currentHour < 12;
                const activeType = isAM ? 'morning' : 'evening';
                const activeRituals = rituals.filter(r => r.type === activeType && !r.completed);
                
                document.getElementById('ritual-title').innerText = isAM ? "AM Protocol" : "PM Protocol";
                document.getElementById('ritual-badge').innerText = `${activeRituals.length} Active`;
                document.getElementById('ritual-icon').className = isAM ? "ph-fill ph-sun-horizon text-accentPurple text-xl" : "ph-fill ph-moon-stars text-accentPurple text-xl";

                let rHTML = '';
                if(activeRituals.length === 0) {
                    rHTML = `<p class="text-[9px] text-center text-gray-400 py-2 uppercase tracking-widest">-- Protocol Cleared --</p>`;
                } else {
                    // Show up to 3 rituals directly on the dashboard
                    activeRituals.slice(0, 3).forEach(r => {
                        rHTML += `
                            <div class="inline-item">
                                <div class="flex items-center gap-2 truncate">
                                    <div class="w-1.5 h-1.5 rounded-full bg-accentPurple shadow-[0_0_5px_#A855F7] shrink-0"></div>
                                    <p class="text-[11px] font-semibold truncate text-gray-200">${r.text}</p>
                                </div>
                                ${r.time ? `<span class="text-[8px] font-black text-gray-500 uppercase shrink-0">${r.time}</span>` : ''}
                            </div>`;
                    });
                    if(activeRituals.length > 3) {
                        rHTML += `<p class="text-[8px] text-center text-accentPurple font-black mt-1 uppercase">+ ${activeRituals.length - 3} More Active</p>`;
                    }
                }
                document.getElementById('inline-rituals').innerHTML = rHTML;

                // 4. TASK PROTOCOL SYNC (Inline Display)
                const activeTasks = todos.filter(t => !t.completed);
                document.getElementById('task-badge').innerText = `${activeTasks.length} Pending`;
                
                let tHTML = '';
                if(activeTasks.length === 0) {
                    tHTML = `<p class="text-[9px] text-center text-gray-400 py-2 uppercase tracking-widest">-- All Vectors Cleared --</p>`;
                } else {
                    // Show up to 3 tasks directly on the dashboard
                    activeTasks.slice(0, 3).forEach(t => {
                        const dotColor = getTagColor(t.tag).split(' ')[0].replace('text-', 'bg-'); // Extract bg color from text class
                        
                        tHTML += `
                            <div class="inline-item">
                                <div class="flex items-center gap-2 truncate">
                                    <div class="w-1.5 h-1.5 rounded-sm ${dotColor} shrink-0"></div>
                                    <p class="text-[11px] font-semibold truncate text-gray-200">${t.text}</p>
                                </div>
                            </div>`;
                    });
                    if(activeTasks.length > 3) {
                        tHTML += `<p class="text-[8px] text-center text-accentTeal font-black mt-1 uppercase">+ ${activeTasks.length - 3} More Vectors</p>`;
                    }
                }
                document.getElementById('inline-tasks').innerHTML = tHTML;

            } catch (e) { 
                console.error("Sync Engine Error", e);
            }
        }

        window.onload = () => {
            updateClock();
            syncDashboard();
            
            // Heartbeat: Sync every 2 seconds
            setInterval(() => {
                updateClock();
                syncDashboard();
            }, 2000); 

            // Storage Listener: Sync instantly when another tab changes
            window.addEventListener('storage', syncDashboard); 
        };
    </script>
