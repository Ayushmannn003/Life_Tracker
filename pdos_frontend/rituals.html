<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Rituals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentYellow: '#FBBF24', accentRed: '#FF4C4C' 
                    }
                }
            }
        }
    </script>
    <style>
        /* STRICT MOBILE VIEWPORT LOCKS */
        body, html { background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; margin: 0; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
        .mobile-viewport { width: 100%; max-width: 430px; height: 100dvh; margin: 0 auto; position: relative; background-color: #020202; display: flex; flex-direction: column; overflow: hidden; }

        /* THEMATIC BACKGROUND: Calm, dark, atmospheric zen water */
        .rituals-bg { 
            background-image: url('https://images.unsplash.com/photo-1518241353330-0f7941c2d1b5?auto=format&fit=crop&q=80&w=1000'); 
            background-size: cover; background-position: center; position: absolute; inset: 0; opacity: 0.15; z-index: 1; filter: grayscale(100%) contrast(120%); 
        }
        .vignette { background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.98) 80%, #000 100%); position: absolute; inset: 0; z-index: 2; }
        .content-layer { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* SCROLLABLE AREA */
        main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 1.25rem; }
        main::-webkit-scrollbar { display: none; }

        .glass-panel { background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-dark { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.3s; font-size: 14px; width: 100%; }
        
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }

        /* Segmented Control for Morning/Evening Toggle */
        .segment-btn { flex: 1; text-align: center; padding: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s; border-radius: 10px; color: #6b7280; }
        .segment-btn.active-morning { background: rgba(251, 191, 36, 0.2); color: #FBBF24; box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.5); }
        .segment-btn.active-evening { background: rgba(168, 85, 247, 0.2); color: #A855F7; box-shadow: inset 0 0 0 1px rgba(168, 85, 247, 0.5); }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <div class="rituals-bg"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            <header class="p-6 pb-2 flex justify-between items-center border-b border-white/5 bg-black/20 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                    <h1 class="text-xl font-black text-white tracking-widest uppercase">Rituals</h1>
                </div>
                <div class="text-[9px] font-black text-accentTeal border border-accentTeal/20 bg-accentTeal/5 px-3 py-1 rounded-full uppercase">Bookends</div>
            </header>

            <main>
                <div class="glass-panel p-5 rounded-[2rem] mb-8 border-t-2 border-t-white shadow-2xl space-y-4">
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-plus-circle text-white text-lg"></i> Establish Routine
                    </h3>
                    
                    <div class="flex bg-black/50 p-1 rounded-xl border border-white/5">
                        <div id="btn-morning" class="segment-btn active-morning" onclick="setPhase('morning')">Dawn (AM)</div>
                        <div id="btn-evening" class="segment-btn" onclick="setPhase('evening')">Dusk (PM)</div>
                    </div>

                    <div class="flex gap-2">
                        <input type="time" id="ritual-time" class="w-1/3 input-dark !text-[11px] font-bold text-gray-300 !px-2 text-center">
                        <input type="text" id="ritual-name" placeholder="E.g. Cold Shower..." class="flex-1 input-dark !text-xs font-bold text-white">
                    </div>

                    <button onclick="addRitual()" class="w-full bg-white/10 text-white border border-white/20 font-black py-3.5 rounded-xl uppercase text-[10px] tracking-widest active:scale-95 transition flex justify-center items-center gap-2 mt-2">
                        Lock to Protocol
                    </button>
                </div>

                <div class="space-y-4 mb-8">
                    <h3 class="text-[10px] font-black text-accentYellow uppercase tracking-[0.2em] px-2 flex items-center gap-2 border-b border-white/10 pb-2">
                        <i class="ph-fill ph-sun text-accentYellow text-lg"></i> Dawn Protocol
                    </h3>
                    <div id="morning-list" class="space-y-2">
                        </div>
                </div>

                <div class="space-y-4 mb-10">
                    <h3 class="text-[10px] font-black text-accentPurple uppercase tracking-[0.2em] px-2 flex items-center gap-2 border-b border-white/10 pb-2">
                        <i class="ph-fill ph-moon-stars text-accentPurple text-lg"></i> Dusk Protocol
                    </h3>
                    <div id="evening-list" class="space-y-2">
                        </div>
                </div>

                <div class="h-32"></div>
            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>

    <script>
        // --- STATE MANAGEMENT ---
        let rituals = JSON.parse(localStorage.getItem('sys_rituals')) || { morning: [], evening: [] };
        let activePhase = 'morning';

        // --- UI INTERACTION ---
        function setPhase(phase) {
            activePhase = phase;
            const btnMorning = document.getElementById('btn-morning');
            const btnEvening = document.getElementById('btn-evening');

            if (phase === 'morning') {
                btnMorning.classList.add('active-morning');
                btnEvening.classList.remove('active-evening');
            } else {
                btnEvening.classList.add('active-evening');
                btnMorning.classList.remove('active-morning');
            }
        }

        // --- CORE FUNCTIONS ---
        function addRitual() {
            const timeVal = document.getElementById('ritual-time').value;
            const name = document.getElementById('ritual-name').value.trim();
            
            if (!timeVal || !name) {
                alert("Please assign a time and a name to the ritual.");
                return;
            }

            // Convert 24h to 12h AM/PM format
            const [hours, minutes] = timeVal.split(':');
            const parsedHours = parseInt(hours, 10);
            const ampm = parsedHours >= 12 ? 'PM' : 'AM';
            const displayHours = parsedHours % 12 || 12;
            const displayTime = `${displayHours}:${minutes} ${ampm}`;

            const newRitual = {
                id: Date.now(),
                name: name,
                rawTime: timeVal,
                displayTime: displayTime
            };

            rituals[activePhase].push(newRitual);
            
            // Reset Input
            document.getElementById('ritual-time').value = '';
            document.getElementById('ritual-name').value = '';
            
            sync();
        }

        function deleteRitual(id, phase) {
            rituals[phase] = rituals[phase].filter(r => r.id !== id);
            sync();
        }

        // --- RENDER ENGINE ---
        function sync() {
            localStorage.setItem('sys_rituals', JSON.stringify(rituals));
            render();
        }

        function render() {
            const morningContainer = document.getElementById('morning-list');
            const eveningContainer = document.getElementById('evening-list');
            
            morningContainer.innerHTML = '';
            eveningContainer.innerHTML = '';

            // Sort arrays chronologically based on raw 24h time
            rituals.morning.sort((a, b) => a.rawTime.localeCompare(b.rawTime));
            rituals.evening.sort((a, b) => a.rawTime.localeCompare(b.rawTime));

            // RENDER MORNING
            if (rituals.morning.length === 0) {
                morningContainer.innerHTML = `<p class="text-[9px] text-gray-700 italic px-2 uppercase tracking-widest">No dawn protocols set.</p>`;
            } else {
                rituals.morning.forEach(ritual => {
                    morningContainer.innerHTML += `
                        <div class="glass-panel p-3.5 rounded-2xl flex justify-between items-center gap-3 border-l-2 border-l-accentYellow/50 hover:bg-accentYellow/5 transition">
                            <span class="text-[10px] font-black text-accentYellow w-16 shrink-0">${ritual.displayTime}</span>
                            <span class="text-xs font-bold text-gray-200 flex-1 leading-tight">${ritual.name}</span>
                            <i class="ph ph-trash text-gray-600 hover:text-red-500 active:text-red-500 transition cursor-pointer text-sm shrink-0" onclick="deleteRitual(${ritual.id}, 'morning')"></i>
                        </div>
                    `;
                });
            }

            // RENDER EVENING
            if (rituals.evening.length === 0) {
                eveningContainer.innerHTML = `<p class="text-[9px] text-gray-700 italic px-2 uppercase tracking-widest">No dusk protocols set.</p>`;
            } else {
                rituals.evening.forEach(ritual => {
                    eveningContainer.innerHTML += `
                        <div class="glass-panel p-3.5 rounded-2xl flex justify-between items-center gap-3 border-l-2 border-l-accentPurple/50 hover:bg-accentPurple/5 transition">
                            <span class="text-[10px] font-black text-accentPurple w-16 shrink-0">${ritual.displayTime}</span>
                            <span class="text-xs font-bold text-gray-200 flex-1 leading-tight">${ritual.name}</span>
                            <i class="ph ph-trash text-gray-600 hover:text-red-500 active:text-red-500 transition cursor-pointer text-sm shrink-0" onclick="deleteRitual(${ritual.id}, 'evening')"></i>
                        </div>
                    `;
                });
            }
        }

        // Init
        window.onload = render;
    </script>
</body>
</html>
