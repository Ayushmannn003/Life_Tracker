<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Core Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202', accentTeal: '#66FCF1', accentBlue: '#3B82F6', 
                        accentPurple: '#A855F7', accentYellow: '#FBBF24', accentRed: '#FF4C4C' 
                    }
                }
            }
        }
    </script>
    <style>
        /* UNIVERSAL MOBILE SCROLL LOCK */
        body, html { background-color: #000; color: #C5C6C7; font-family: 'Inter', sans-serif; margin: 0; height: 100%; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
        .mobile-viewport { width: 100%; max-width: 430px; height: 100dvh; margin: 0 auto; position: relative; background-color: #020202; display: flex; flex-direction: column; overflow: hidden; }
        
        .analyzer-bg { background-image: url('https://images.unsplash.com/photo-1543286386-713bdd548da4?auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; position: absolute; inset: 0; opacity: 0.1; z-index: 1; filter: grayscale(100%); }
        .vignette { background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.98) 80%, #000 100%); position: absolute; inset: 0; z-index: 2; }
        .content-layer { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 1.25rem; }
        main::-webkit-scrollbar { display: none; }
        
        .glass-panel { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s ease-in-out; }
        .chart-line { fill: none; stroke-width: 3; stroke-linecap: round; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <div class="analyzer-bg"></div>
        <div class="vignette"></div>

        <div class="content-layer">
            <div id="sidebar-injector"></div>

            <header class="p-6 pb-2 flex justify-between items-center z-20 bg-black/30 backdrop-blur-md border-b border-white/5">
                <div class="flex items-center gap-4">
                    <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer active:scale-90 transition"></i>
                    <h1 class="text-xl font-black text-white tracking-widest uppercase">Analytics</h1>
                </div>
                <div class="text-[9px] font-black text-accentTeal border border-accentTeal/20 bg-accentTeal/5 px-3 py-1 rounded-full uppercase flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 bg-accentTeal rounded-full animate-pulse"></div> Live
                </div>
            </header>

            <main>
                <div id="analytics-content" class="space-y-5 p-1">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass-panel p-5 rounded-[2rem] space-y-3">
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Capital Burn</p>
                            <h2 class="text-xl font-black text-white" id="core-budget">₹0</h2>
                            <div class="progress-track"><div id="budget-bar" class="progress-fill bg-accentRed" style="width: 0%"></div></div>
                        </div>
                        <div class="glass-panel p-5 rounded-[2rem] space-y-3">
                            <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest">Task Yield</p>
                            <h2 class="text-xl font-black text-white"><span id="task-done">0</span><span class="text-xs text-gray-600 ml-1">Total</span></h2>
                            <div class="progress-track"><div id="task-bar" class="progress-fill bg-accentTeal" style="width: 0%"></div></div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-[2.5rem] border-t-2 border-t-accentYellow">
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-1">Deep Focus Yield (Today)</p>
                                <h2 class="text-2xl font-black text-white"><span id="focus-hours">0</span>h <span id="focus-mins">0</span>m</h2>
                            </div>
                            <span id="focus-sessions" class="text-[10px] font-black text-accentYellow uppercase border border-accentYellow/20 px-2 py-0.5 rounded">0 Sessions</span>
                        </div>
                        <div class="progress-track"><div id="focus-bar" class="progress-fill bg-accentYellow" style="width: 0%"></div></div>
                    </div>

                    <div class="glass-panel p-6 rounded-[2.5rem] border-t-2 border-t-accentPurple space-y-6">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <i class="ph-fill ph-moon text-accentPurple text-lg"></i>
                                <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em]">Recovery Arc</h3>
                            </div>
                            <span class="text-[9px] font-black text-gray-500 uppercase">Last 7 Days</span>
                        </div>

                        <div class="space-y-2">
                            <div class="flex justify-between items-center px-1">
                                <span class="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">Core Sleep (Hours)</span>
                                <span id="avg-sleep" class="text-[10px] font-black text-accentPurple">Avg: 0h</span>
                            </div>
                            <div class="h-16 w-full bg-white/5 rounded-xl p-2 relative overflow-hidden">
                                <svg viewBox="0 0 100 30" class="w-full h-full">
                                    <path id="sleep-path" d="M0,30 L20,30 L40,30 L60,30 L80,30 L100,30" class="chart-line stroke-accentPurple" fill="none" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-[2.5rem] border-t-2 border-t-accentBlue space-y-5">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <i class="ph-fill ph-calendar-check text-accentBlue text-lg"></i>
                                <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em]">Routine Adherence</h3>
                            </div>
                            <span id="habit-pct" class="text-xs font-black text-accentBlue">0%</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                                <p class="text-[7px] font-bold text-gray-500 uppercase tracking-widest mb-1">Active Routines</p>
                                <p id="habit-active" class="text-lg font-black text-white">0</p>
                            </div>
                            <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                                <p class="text-[7px] font-bold text-gray-500 uppercase tracking-widest mb-1">MTD Checks</p>
                                <p id="habit-hits" class="text-lg font-black text-white">0</p>
                            </div>
                        </div>

                        <div class="progress-track mt-2"><div id="habit-bar" class="progress-fill bg-accentBlue" style="width: 0%"></div></div>
                    </div>

                    <div class="glass-panel p-6 rounded-[2.5rem] border-t-2 border-t-white/30 space-y-4">
                        <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em]">Media Yield</h3>
                        <div class="grid grid-cols-3 gap-2 text-center">
                            <div><p id="movies-stat" class="text-sm font-black text-white">0/0</p><p class="text-[7px] text-gray-500 uppercase font-bold mt-1">Movies</p></div>
                            <div><p id="shows-stat" class="text-sm font-black text-white">0/0</p><p class="text-[7px] text-gray-500 uppercase font-bold mt-1">Series</p></div>
                            <div><p id="books-stat" class="text-sm font-black text-white">0/0</p><p class="text-[7px] text-gray-500 uppercase font-bold mt-1">Books</p></div>
                        </div>
                    </div>
                </div> <div class="mt-6 glass-panel p-5 rounded-[2rem] border border-white/10 flex gap-3">
                    <button onclick="exportTextReport()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-black py-4 rounded-xl uppercase text-[9px] tracking-widest active:scale-95 transition flex justify-center items-center gap-2">
                        <i class="ph-bold ph-file-text text-lg"></i> Text Log
                    </button>
                    <button id="btn-img-export" onclick="exportImageReport()" class="flex-1 bg-accentTeal text-black font-black py-4 rounded-xl uppercase text-[9px] tracking-widest active:scale-95 transition flex justify-center items-center gap-2">
                        <i class="ph-bold ph-image text-lg"></i> Image Export
                    </button>
                </div>

                <div class="h-32"></div>

            </main>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script>
        function syncAnalytics() {
            // -- FINANCE --
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            const spent = expenses.reduce((s, e) => s + e.amount, 0);
            document.getElementById('core-budget').innerText = `₹${spent.toLocaleString('en-IN')}`;
            document.getElementById('budget-bar').style.width = `${Math.min((spent/50000)*100, 100)}%`;

            // -- TASKS --
            const tasks = JSON.parse(localStorage.getItem('system_tasks')) || [];
            const tDone = tasks.filter(t => t.done).length;
            document.getElementById('task-done').innerText = tDone;
            document.getElementById('task-bar').style.width = `${tasks.length > 0 ? (tDone/tasks.length)*100 : 0}%`;

            // -- FOCUS --
            const focusLogs = JSON.parse(localStorage.getItem('sys_focus_logs')) || [];
            const today = new Date().toISOString().split('T')[0];
            const todaysLogs = focusLogs.filter(l => l.date === today);
            const totalMins = todaysLogs.reduce((s, l) => s + l.duration, 0);
            document.getElementById('focus-hours').innerText = Math.floor(totalMins / 60);
            document.getElementById('focus-mins').innerText = totalMins % 60;
            document.getElementById('focus-sessions').innerText = `${todaysLogs.length} Sessions`;
            document.getElementById('focus-bar').style.width = `${Math.min((totalMins/240)*100, 100)}%`;

            // -- RECOVERY ARCHITECTURE --
            const sleepData = JSON.parse(localStorage.getItem('sys_sleep_logs')) || [7, 6.5, 8, 7.2, 6, 7.5, 8]; 
            const avgSleep = sleepData.length > 0 ? (sleepData.reduce((a,b) => a+b, 0) / sleepData.length).toFixed(1) : 0;
            document.getElementById('avg-sleep').innerText = `Avg: ${avgSleep}h`;

            const generatePath = (data, max) => {
                if(data.length === 0) return "M0,30 L100,30";
                let points = data.map((val, i) => `${i * (100 / Math.max(1, data.length - 1))},${30 - (val / max * 25)}`).join(' L');
                return `M${points}`;
            };
            document.getElementById('sleep-path').setAttribute('d', generatePath(sleepData, 10));

            // -- REGULAR HABITS (MONTHLY) --
            const regHabits = JSON.parse(localStorage.getItem('sys_reg_habits')) || [];
            let activeRegCount = regHabits.length;
            let regTotalHits = 0;
            
            const dateObj = new Date();
            const currentYear = dateObj.getFullYear();
            const currentMonth = dateObj.getMonth();
            const currentDay = dateObj.getDate();
            let possibleRegHits = activeRegCount * currentDay;

            regHabits.forEach(habit => {
                if(habit.logs) {
                    for (let d = 1; d <= currentDay; d++) {
                        const dateKey = `${currentYear}-${currentMonth}-${d}`;
                        if (habit.logs[dateKey]) regTotalHits++;
                    }
                }
            });

            const regHabitPct = possibleRegHits > 0 ? Math.round((regTotalHits / possibleRegHits) * 100) : 0;
            document.getElementById('habit-active').innerText = activeRegCount;
            document.getElementById('habit-hits').innerText = regTotalHits;
            document.getElementById('habit-pct').innerText = `${regHabitPct}%`;
            document.getElementById('habit-bar').style.width = `${regHabitPct}%`;

            // -- LIBRARY SYNC --
            const cats = ['movies', 'shows', 'books'];
            cats.forEach(c => {
                const data = JSON.parse(localStorage.getItem(`sys_${c}`)) || [];
                document.getElementById(`${c}-stat`).innerText = `${data.filter(i => i.done).length}/${data.length}`;
            });
        }

        // --- EXPORT ENGINES ---
        function exportTextReport() {
            const now = new Date().toLocaleString('en-US');
            let report = `=================================\n`;
            report += `  SYSTEM OS: CORE ANALYTICS LOG\n`;
            report += `  Generated: ${now}\n`;
            report += `=================================\n\n`;
            
            report += `[ FINANCE ]\n`;
            report += `Capital Burn: ${document.getElementById('core-budget').innerText}\n\n`;
            
            report += `[ PRODUCTIVITY ]\n`;
            report += `Tasks Completed: ${document.getElementById('task-done').innerText}\n`;
            report += `Focus Time (Today): ${document.getElementById('focus-hours').innerText}h ${document.getElementById('focus-mins').innerText}m\n\n`;
            
            report += `[ HEALTH & RECOVERY ]\n`;
            report += `7-Day Sleep Avg: ${document.getElementById('avg-sleep').innerText}\n\n`;

            report += `[ ROUTINE ADHERENCE ]\n`;
            report += `Active Routines: ${document.getElementById('habit-active').innerText}\n`;
            report += `Month-to-Date Hits: ${document.getElementById('habit-hits').innerText}\n`;
            report += `Hit Rate: ${document.getElementById('habit-pct').innerText}\n\n`;

            report += `[ MEDIA YIELD ]\n`;
            report += `Movies (Completed/Total): ${document.getElementById('movies-stat').innerText}\n`;
            report += `Shows (Completed/Total): ${document.getElementById('shows-stat').innerText}\n`;
            report += `Books (Completed/Total): ${document.getElementById('books-stat').innerText}\n`;

            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SystemOS_Log_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportImageReport() {
            const btn = document.getElementById('btn-img-export');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-lg"></i> Processing...`;
            
            const contentToCapture = document.getElementById('analytics-content');
            
            // Generate canvas using the external library
            html2canvas(contentToCapture, {
                backgroundColor: '#020202', // Force dark background
                scale: 2, // High DPI for retina displays
                useCORS: true
            }).then(canvas => {
                const url = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = url;
                a.download = `SystemOS_Dashboard_${new Date().toISOString().split('T')[0]}.png`;
                a.click();
                
                // Reset Button
                btn.innerHTML = originalHTML;
            }).catch(err => {
                console.error("Screenshot failed:", err);
                btn.innerHTML = originalHTML;
                alert("Failed to export image.");
            });
        }

        // Initialize and poll
        window.onload = syncAnalytics;
        setInterval(syncAnalytics, 5000);
    </script>
</body>
</html>
