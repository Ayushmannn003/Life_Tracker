<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Finance Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bgDark: '#020202',
                        cardDark: 'rgba(15, 23, 42, 0.5)',
                        accentTeal: '#66FCF1',
                        accentBlue: '#2563EB',
                        accentPurple: '#8B5CF6',
                        accentOrange: '#F97316'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #C5C6C7; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { display: none; }
        
        /* THE OBSIDIAN STACK */
        .obsidian-bg {
            background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .obsidian-overlay {
            /* Heavy Top and Bottom Vignette for maximum focus */
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.85) 0%, 
                rgba(0,0,0,0.6) 20%, 
                rgba(2,2,2,0.95) 70%, 
                rgba(0,0,0,1) 100%);
            position: absolute; inset: 0; z-index: 1;
        }
        .main-content { position: relative; z-index: 2; }
        
        .glass-panel { 
            background: rgba(13, 17, 23, 0.7); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        .input-dark { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            padding: 12px; 
            color: #FFF; 
            outline: none; 
            transition: border 0.3s;
        }
        .input-dark:focus { border-color: #66FCF1; }

        .btn-obsidian {
            background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-obsidian:active { transform: scale(0.97); }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-bgDark relative shadow-2xl overflow-x-hidden min-h-[100dvh] flex flex-col obsidian-bg">
        <div class="obsidian-overlay"></div>
        
        <div class="main-content flex-1 flex flex-col">
            <div id="sidebar-injector"></div>

            <header class="p-6 pb-2 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <i id="menu-btn" class="ph ph-list text-2xl text-white cursor-pointer hover:text-accentTeal transition"></i>
                    <h1 class="text-xl font-bold text-white tracking-widest uppercase">Finance Hub</h1>
                </div>
                <div class="text-[9px] font-black text-accentTeal bg-accentTeal/5 px-3 py-1 rounded-full border border-accentTeal/10">04 APR 26</div>
            </header>

            <main class="flex-1 overflow-y-auto p-5 space-y-6">
                
                <div class="glass-panel p-6 rounded-[2.5rem] space-y-4">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] text-gray-500 uppercase font-black tracking-tighter mb-1">Monthly Limit</p>
                            <div class="flex items-center gap-1">
                                <span class="text-white font-bold">₹</span>
                                <input type="number" id="budget-limit" value="50000" oninput="updateCalculations()" class="bg-transparent text-3xl font-bold text-white w-32 outline-none">
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-500 uppercase font-black tracking-tighter mb-1">Available</p>
                            <p id="remaining-val" class="text-2xl font-bold text-accentTeal">₹50,000</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="w-full bg-black/80 rounded-full h-1 overflow-hidden">
                            <div id="progress-bar" class="bg-accentBlue h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <div class="flex justify-between text-[8px] text-gray-600 font-black uppercase">
                            <span id="spent-label">₹0 SPENT</span>
                            <span id="percent-label">0% UTILIZED</span>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-[2.5rem] space-y-4">
                    <div class="flex bg-black/80 p-1 rounded-2xl gap-1">
                        <button id="tab-exp" onclick="switchTab('exp')" class="flex-1 py-2.5 text-[10px] font-black uppercase rounded-xl bg-accentBlue text-white shadow-lg transition-all">Expense</button>
                        <button id="tab-sub" onclick="switchTab('sub')" class="flex-1 py-2.5 text-[10px] font-black uppercase rounded-xl text-gray-600 transition-all">Subscription</button>
                    </div>

                    <div class="space-y-3">
                        <input type="text" id="input-name" placeholder="Transaction Name" class="w-full input-dark">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="input-cost" placeholder="Amount ₹" class="input-dark">
                            <select id="input-cat" class="input-dark">
                                <option>Food</option>
                                <option>Bills</option>
                                <option>Rent/EMI</option>
                                <option>Shopping</option>
                                <option>Transport</option>
                                <option>Health</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <input type="date" id="input-date" class="w-full input-dark">
                        <button onclick="handleEntry()" class="w-full btn-obsidian py-4 rounded-2xl shadow-xl border-t border-white/5 active:bg-accentBlue active:text-white transition-all">+ Log Transaction</button>
                    </div>
                </div>

                <div class="space-y-6">
                    <section>
                        <h3 class="text-[10px] font-black text-accentPurple uppercase tracking-[0.2em] px-2 mb-3">Subscriptions</h3>
                        <div id="list-subs" class="space-y-3"></div>
                    </section>
                    <section>
                        <h3 class="text-[10px] font-black text-white uppercase tracking-[0.2em] px-2 mb-3">Today</h3>
                        <div id="list-today" class="space-y-3"></div>
                    </section>
                    <section class="pb-16">
                        <div class="flex justify-between items-center px-2 mb-3">
                            <h3 class="text-[10px] font-black text-gray-700 uppercase tracking-[0.2em]">Archive</h3>
                            <button onclick="toggleArchive()" id="archive-toggle" class="text-[8px] text-accentTeal border border-accentTeal/20 px-2 py-0.5 rounded uppercase font-black">View All</button>
                        </div>
                        <div id="list-archive" class="space-y-3 hidden"></div>
                    </section>
                </div>

            </main>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        const SYSTEM_TODAY = "2026-04-04";
        let expenses = [];
        let subscriptions = [];
        let activeTab = 'exp';
        let archiveVisible = false;

        document.getElementById('input-date').value = SYSTEM_TODAY;

        function switchTab(type) {
            activeTab = type;
            const btnExp = document.getElementById('tab-exp');
            const btnSub = document.getElementById('tab-sub');
            if(type === 'exp') {
                btnExp.className = "flex-1 py-2.5 text-[10px] font-black uppercase rounded-xl bg-accentBlue text-white shadow-lg";
                btnSub.className = "flex-1 py-2.5 text-[10px] font-black uppercase rounded-xl text-gray-600";
            } else {
                btnSub.className = "flex-1 py-2.5 text-[10px] font-black uppercase rounded-xl bg-accentPurple text-white shadow-lg";
                btnExp.className = "flex-1 py-2.5 text-[10px] font-black uppercase rounded-xl text-gray-600";
            }
        }

        function toggleArchive() {
            archiveVisible = !archiveVisible;
            document.getElementById('list-archive').classList.toggle('hidden');
            document.getElementById('archive-toggle').innerText = archiveVisible ? "Hide" : "View All";
        }

        function updateCalculations() {
            const limit = parseFloat(document.getElementById('budget-limit').value) || 0;
            const totalSpent = [...expenses, ...subscriptions].reduce((s, e) => s + e.amount, 0);
            const remaining = limit - totalSpent;
            const percent = limit > 0 ? Math.min((totalSpent / limit) * 100, 100) : 0;

            document.getElementById('remaining-val').innerText = `₹${remaining.toLocaleString('en-IN')}`;
            document.getElementById('spent-label').innerText = `₹${totalSpent.toLocaleString('en-IN')} SPENT`;
            document.getElementById('percent-label').innerText = `${Math.round(percent)}% UTILIZED`;
            
            const bar = document.getElementById('progress-bar');
            bar.style.width = `${percent}%`;
            bar.className = percent > 90 ? "bg-red-600 h-full transition-all duration-1000" : "bg-accentBlue h-full transition-all duration-1000";
            
            renderAll();
        }

        function renderAll() {
            const subC = document.getElementById('list-subs');
            const todayC = document.getElementById('list-today');
            const archC = document.getElementById('list-archive');
            subC.innerHTML = ''; todayC.innerHTML = ''; archC.innerHTML = '';

            subscriptions.forEach(sub => subC.innerHTML += createCard(sub, 'sub', 'accentPurple'));
            expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(exp => {
                const card = createCard(exp, 'exp', exp.date === SYSTEM_TODAY ? 'accentOrange' : 'gray-800');
                if(exp.date === SYSTEM_TODAY) todayC.innerHTML += card;
                else archC.innerHTML += card;
            });
        }

        function createCard(data, type, color) {
            return `
                <div class="glass-panel p-4 rounded-2xl flex justify-between items-center group">
                    <div class="flex items-center gap-4">
                        <div class="w-1 h-1 rounded-full bg-${color}"></div>
                        <div>
                            <h4 class="text-white text-sm font-semibold">${data.name}</h4>
                            <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">${data.category} • ${data.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-5">
                        <p class="text-white font-bold">₹${data.amount.toLocaleString('en-IN')}</p>
                        <button onclick="deleteEntry('${type}', ${data.id})" class="text-gray-700 hover:text-red-500 transition-colors">
                            <i class="ph ph-trash text-lg"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function handleEntry() {
            const name = document.getElementById('input-name').value;
            const cost = parseFloat(document.getElementById('input-cost').value);
            const date = document.getElementById('input-date').value;
            if (!name || isNaN(cost) || !date) return;
            const entry = { id: Date.now(), name, amount: cost, category: document.getElementById('input-cat').value, date };
            if(activeTab === 'exp') expenses.push(entry);
            else subscriptions.push(entry);
            document.getElementById('input-name').value = '';
            document.getElementById('input-cost').value = '';
            updateCalculations();
        }

        function deleteEntry(type, id) {
            if(type === 'exp') expenses = expenses.filter(e => e.id !== id);
            else subscriptions = subscriptions.filter(s => s.id !== id);
            updateCalculations();
        }

        window.onload = updateCalculations;
    </script>
</body>
</html>
